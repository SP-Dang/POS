<!DOCTYPE html>
<html lang="lo">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mPOS | Customer Loyalty</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Phetsarath&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --primary: #10b981; --sidebar: #0f172a; --bg: #f8fafc; 
            --text: #1e293b; --lao: 'Phetsarath', sans-serif;
        }
        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', var(--lao); }
        body { margin: 0; display: flex; background: var(--bg); height: 100vh; overflow: hidden; }

        /* Sidebar */
        .sidebar { width: 260px; background: var(--sidebar); color: white; padding: 30px 20px; display: flex; flex-direction: column; }
        .logo { font-weight: 800; font-size: 22px; color: var(--primary); margin-bottom: 40px; display: flex; align-items: center; gap: 10px; }
        .nav-item { padding: 14px 18px; border-radius: 12px; color: #94a3b8; text-decoration: none; display: flex; align-items: center; gap: 12px; margin-bottom: 8px; font-weight: 600; font-size: 14px; }
        .nav-item:hover { background: rgba(255,255,255,0.05); color: white; }
        .nav-active { background: var(--primary); color: white; }

        /* Main Content */
        .main { flex: 1; padding: 40px; overflow-y: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }

        /* Forms & Inputs */
        .card { background: white; border-radius: 20px; padding: 25px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); border: 1px solid #f1f5f9; margin-bottom: 30px; }
        .grid-form { display: grid; grid-template-columns: 1fr 1fr auto; gap: 15px; align-items: end; }
        input { padding: 12px 15px; border-radius: 10px; border: 1px solid #e2e8f0; font-size: 14px; outline: none; }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1); }
        
        .btn-add { background: var(--primary); color: white; border: none; padding: 12px 25px; border-radius: 10px; cursor: pointer; font-weight: 700; }
        .btn-add:hover { opacity: 0.9; transform: translateY(-1px); }

        /* Table */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #f8fafc; padding: 15px; text-align: left; font-size: 11px; color: #64748b; text-transform: uppercase; }
        td { padding: 16px; border-bottom: 1px solid #f1f5f9; font-size: 14px; }
        
        .point-badge { background: #eff6ff; color: #2563eb; padding: 4px 10px; border-radius: 8px; font-weight: 800; }
    </style>
</head>
<body>

<nav class="sidebar">
    <div class="logo"><span>⚡</span> mPOS</div>
    <a href="index.html" class="nav-item">📊 Dashboard</a> 
    <a href="pos-checkout.html" class="nav-item">🛒 Checkout</a> 
    <a href="pos-customers.html" class="nav-item nav-active">👥 Customers</a>
    <a href="pos-daily-summary.html" class="nav-item">📜 Daily Closing</a>
    <a href="pos-inventory.html" class="nav-item">📦 Inventory</a>
    <a href="pos-reports.html" class="nav-item">📊 Reports</a>
</nav>

<main class="main">
    <div class="header">
        <h1 style="margin:0;">ຈັດການຂໍ້ມູນສະມາຊິກ (Loyalty)</h1>
    </div>

    <div class="card">
        <h3 style="margin-top:0; font-size:16px;">➕ ລົງທະບຽນລູກຄ້າໃໝ່</h3>
        <form id="customer-form" class="grid-form">
            <div style="display:flex; flex-direction:column; gap:5px;">
                <label style="font-size:12px; color:#64748b;">ເບີໂທລະສັບ</label>
                <input type="text" id="cust-phone" placeholder="020..." required>
            </div>
            <div style="display:flex; flex-direction:column; gap:5px;">
                <label style="font-size:12px; color:#64748b;">ຊື່ລູກຄ້າ</label>
                <input type="text" id="cust-name" placeholder="ຊື່ ແລະ ນາມສະກຸນ" required>
            </div>
            <button type="submit" class="btn-add">ບັນທຶກສະມາຊິກ</button>
        </form>
    </div>

    <div class="card" style="padding:0; overflow:hidden;">
        <div style="padding:20px; border-bottom:1px solid #f1f5f9; display:flex; justify-content:space-between; align-items:center;">
            <h3 style="margin:0; font-size:16px;">📋 ລາຍຊື່ສະມາຊິກທັງໝົດ</h3>
            <input type="text" id="search-cust" placeholder="🔍 ຄົ້ນຫາເບີໂທ..." onkeyup="filterCustomers()" style="padding:8px 15px;">
        </div>
        <table>
            <thead>
                <tr>
                    <th>ເບີໂທ</th>
                    <th>ຊື່ສະມາຊິກ</th>
                    <th>ຄະແນນສະສົມ</th>
                    <th>ຍອດຊື້ລວມ</th>
                    <th>ວັນທີລົງທະບຽນ</th>
                </tr>
            </thead>
            <tbody id="customer-list">
                </tbody>
        </table>
    </div>
</main>

<script>
    const u = "https://zddelixvencundnkccpq.supabase.co"; 
    const k = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpkZGVsaXh2ZW5jdW5kbmtjY3BxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxMjQ1MzMsImV4cCI6MjA5MDcwMDUzM30.-RPvOYMLzftubrpJ4KSVrqL2eNaopjty30_TrnkGpBo";
    const _s = supabase.createClient(u, k);

    // ໂຫຼດຂໍ້ມູນລູກຄ້າ
    async function loadCustomers() {
        const { data, error } = await _s.from('pos_customers')
            .select('*')
            .order('created_at', { ascending: false });

        if (error) return alert("Error: " + error.message);

        const list = document.getElementById('customer-list');
        list.innerHTML = data.map(c => `
            <tr>
                <td style="font-weight:700;">${c.phone}</td>
                <td>${c.name}</td>
                <td><span class="point-badge">⭐ ${c.points.toLocaleString()}</span></td>
                <td>${new Intl.NumberFormat('lo-LA').format(c.total_spent)} ₭</td>
                <td style="color:#94a3b8; font-size:12px;">${new Date(c.created_at).toLocaleDateString('lo-LA')}</td>
            </tr>
        `).join('');
    }

    // ບັນທຶກລູກຄ້າໃໝ່
    document.getElementById('customer-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const phone = document.getElementById('cust-phone').value;
        const name = document.getElementById('cust-name').value;

        const { error } = await _s.from('pos_customers').insert([{ phone, name }]);

        if (error) {
            if (error.code === '23505') alert("ເບີໂທນີ້ຖືກລົງທະບຽນແລ້ວ!");
            else alert(error.message);
        } else {
            alert("✅ ລົງທະບຽນສຳເລັດ!");
            document.getElementById('customer-form').reset();
            loadCustomers();
        }
    });

    // ຟັງຊັນຄົ້ນຫາແບບໄວ
    function filterCustomers() {
        const input = document.getElementById('search-cust').value.toLowerCase();
        const rows = document.querySelectorAll('#customer-list tr');
        rows.forEach(row => {
            const phone = row.children[0].innerText.toLowerCase();
            row.style.display = phone.includes(input) ? '' : 'none';
        });
    }

    document.addEventListener('DOMContentLoaded', loadCustomers);
</script>
</body>
</html>
