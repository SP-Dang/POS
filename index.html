<!DOCTYPE html>
<html lang="lo">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LSM POS | Dashboard Elite</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Phetsarath&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #10b981; --bg: #f1f5f9; --sidebar: #0f172a;
            --card: #ffffff; --text: #1e293b; --text-light: #64748b;
            --lao: 'Phetsarath', sans-serif;
        }

        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', var(--lao); }
        body { margin: 0; display: flex; background: var(--bg); height: 100vh; overflow: hidden; }

        /* Sidebar */
        .sidebar { width: 260px; background: var(--sidebar); color: white; padding: 30px 20px; display: flex; flex-direction: column; }
        .logo { font-weight: 800; font-size: 22px; color: var(--primary); margin-bottom: 40px; }
        .nav-item { padding: 14px 18px; border-radius: 12px; color: #94a3b8; text-decoration: none; margin-bottom: 8px; display: flex; align-items: center; gap: 12px; font-size: 14px; transition: 0.3s; }
        .nav-item.active { background: var(--primary); color: white; }

        /* Main Content */
        .main { flex: 1; overflow-y: auto; padding: 40px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }

        /* Stats Cards */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 25px; border-radius: 20px; border: 1px solid rgba(0,0,0,0.05); }
        .stat-label { color: var(--text-light); font-size: 14px; margin-bottom: 5px; }
        .stat-value { font-size: 24px; font-weight: 800; color: var(--sidebar); }

        /* Chart Area */
        .chart-container { background: white; padding: 30px; border-radius: 24px; border: 1px solid rgba(0,0,0,0.05); margin-bottom: 30px; }

        /* Daily Closing Section */
        .closing-card { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); color: white; padding: 30px; border-radius: 24px; display: flex; justify-content: space-between; align-items: center; }
        
        .btn-close-day { background: var(--primary); color: white; border: none; padding: 15px 30px; border-radius: 12px; font-weight: 700; cursor: pointer; font-family: var(--lao); transition: 0.3s; }
        .btn-close-day:hover { transform: scale(1.05); background: #0da371; }

        .debug-bar { position: fixed; bottom: 20px; right: 20px; background: #1e293b; color: #10b981; padding: 10px 20px; border-radius: 10px; font-size: 12px; font-family: monospace; }
    </style>
</head>
<body>

<nav class="sidebar">
    <div class="logo">⚡ mPOS</div>
    <a href="index.html" class="nav-item active">📊 Dashboard</a> 
    <a href="pos-checkout.html" class="nav-item">🛒 Checkout</a> 
    <a href="pos-orders.html" class="nav-item">📄 Order History</a>
    <a href="pos-inventory.html" class="nav-item">📦 Inventory</a>
</nav>

<main class="main">
    <div class="header">
        <h1 style="margin:0; font-family: var(--lao);">ພາບລວມລະບົບ (Dashboard)</h1>
        <div id="today-date" style="color: var(--text-light); font-weight: 600;"></div>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-label">ຍອດຂາຍມື້ນີ້</div>
            <div class="stat-value" id="today-sales">0 ₭</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">ຈຳນວນບິນ</div>
            <div class="stat-value" id="today-orders">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">ສິນຄ້າໃກ້ໝົດ</div>
            <div class="stat-value" id="low-stock-count" style="color: var(--danger);">0</div>
        </div>
    </div>

    <div class="chart-container">
        <h3 style="margin-top:0; font-family: var(--lao);">ແນວໂນ້ມຍອດຂາຍ 7 ວັນຍ້ອນຫຼັງ</h3>
        <canvas id="salesChart" height="100"></canvas>
    </div>

    <div class="closing-card">
        <div>
            <h2 style="margin:0; font-family: var(--lao);">ປິດຍອດປະຈຳວັນ (Daily Closing)</h2>
            <p style="opacity: 0.7; margin: 5px 0 0; font-family: var(--lao);">ກວດສອບ ແລະ ສະຫຼຸບລາຍຮັບກ່ອນປິດຮ້ານ</p>
        </div>
        <button class="btn-close-day" onclick="runDailyClosing()">🚀 ສະຫຼຸບ ແລະ ປິດຍອດ</button>
    </div>
</main>

<div id="debug" class="debug-bar">Initializing Dashboard...</div>

<script>
    const u = "https://zddelixvencundnkccpq.supabase.co"; 
    const k = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpkZGVsaXh2ZW5jdW5kbmtjY3BxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxMjQ1MzMsImV4cCI6MjA5MDcwMDUzM30.-RPvOYMLzftubrpJ4KSVrqL2eNaopjty30_TrnkGpBo";
    const _s = supabase.createClient(u, k);

    const formatLAK = (val) => new Intl.NumberFormat('lo-LA', { style: 'currency', currency: 'LAK', maximumFractionDigits: 0 }).format(val);

    async function initDashboard() {
        document.getElementById('today-date').innerText = new Date().toLocaleDateString('lo-LA', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
        
        await loadStats();
        await loadSalesChart();
    }

    async function loadStats() {
        const today = new Date().toISOString().split('T')[0];

        // 1. ດຶງຍອດຂາຍມື້ນີ້ (ສົມມຸດວ່າ Table ຊື່ 'pos_orders')
        const { data: orders, error } = await _s.from('pos_orders')
            .select('amount')
            .gte('created_at', today);
        
        if (!error) {
            const total = orders.reduce((sum, ord) => sum + ord.amount, 0);
            document.getElementById('today-sales').innerText = formatLAK(total);
            document.getElementById('today-orders').innerText = orders.length;
        }

        // 2. ດຶງສິນຄ້າໃກ້ໝົດ
        const { count, error: stockErr } = await _s.from('pos_products')
            .select('*', { count: 'exact', head: true })
            .filter('stock_qty', 'lte', 'min_stock');
        
        if (!stockErr) document.getElementById('low-stock-count').innerText = count;
    }

    async function loadSalesChart() {
        // ດຶງຂໍ້ມູນ 7 ວັນຍ້ອນຫຼັງ (ໃນທີ່ນີ້ເປັນການຈຳລອງຂໍ້ມູນເພື່ອສະແດງກຣາຟ)
        // ໃນລະບົບຈິງ ທ່ານຕ້ອງ Query ແລ້ວ Group ຕາມວັນທີ
        const ctx = document.getElementById('salesChart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['ຈັນ', 'ອັງຄານ', 'ພຸດ', 'ພະຫັດ', 'ສຸກ', 'ເສົາ', 'ອາທິດ'],
                datasets: [{
                    label: 'ຍອດຂາຍ (₭)',
                    data: [1200000, 1900000, 1500000, 2500000, 2200000, 3500000, 4200000],
                    borderColor: '#10b981',
                    backgroundColor: 'rgba(16, 185, 129, 0.1)',
                    fill: true,
                    tension: 0.4
                }]
            },
            options: {
                plugins: { legend: { display: false } },
                scales: { y: { beginAtZero: true } }
            }
        });
    }

    async function runDailyClosing() {
        const confirmClose = confirm("ທ່ານແນ່ໃຈບໍ່ວ່າຕ້ອງການປິດຍອດປະຈຳວັນ? ລະບົບຈະສະຫຼຸບລາຍງານທັງໝົດ.");
        if (confirmClose) {
            // ນີ້ແມ່ນບ່ອນທີ່ທ່ານຈະສົ່ງຂໍ້ມູນໄປ Table 'daily_reports'
            alert("ປິດຍອດສຳເລັດ! ລະບົບໄດ້ບັນທຶກລາຍງານປະຈຳວັນແລ້ວ.");
            // ສາມາດ redirect ໄປໜ້າລາຍງານໄດ້
        }
    }

    document.addEventListener('DOMContentLoaded', initDashboard);
</script>
</body>
</html>
