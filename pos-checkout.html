<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mPOS | Inventory Sync Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Phetsarath:wght@400;700&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #10b981; --sidebar: #0f172a; --bg: #f8fafc; --text: #1e293b; --lao-font: 'Phetsarath', sans-serif; }
        * { box-sizing: border-box; font-family: var(--lao-font), sans-serif; }
        body { margin: 0; display: flex; background: var(--bg); height: 100vh; overflow: hidden; }
        .sidebar { width: 220px; background: var(--sidebar); color: white; padding: 25px 15px; display: flex; flex-direction: column; }
        .nav-item { padding: 12px; border-radius: 10px; color: #94a3b8; text-decoration: none; margin-bottom: 5px; display: block; font-size: 14px; }
        .nav-item.active { background: var(--primary); color: white; }
        .checkout-container { flex: 1; display: grid; grid-template-columns: 1fr 320px; }
        .cart-section { padding: 25px; overflow-y: auto; }
        .cart-table { width: 100%; border-collapse: collapse; background: white; border-radius: 12px; overflow: hidden; }
        .cart-table th { background: #f1f5f9; padding: 12px; text-align: left; font-size: 12px; }
        .cart-table td { padding: 12px; border-bottom: 1px solid #f1f5f9; }
        .summary-section { background: white; border-left: 1px solid #e2e8f0; padding: 20px; display: flex; flex-direction: column; }
        .total-card { background: var(--sidebar); color: white; padding: 20px; border-radius: 15px; margin-top: auto; }
        .btn-complete { width: 100%; background: var(--primary); color: white; border: none; padding: 18px; border-radius: 12px; font-size: 18px; font-weight: 800; cursor: pointer; margin-top: 15px; }
        .btn-complete:disabled { background: #64748b; }
        #print-receipt { display: none; }
        @media print {
            body * { visibility: hidden; }
            #print-receipt, #print-receipt * { visibility: visible; }
            #print-receipt { display: block; position: absolute; left: 0; top: 0; width: 58mm; font-size: 10px; line-height: 1.3; }
            .r-line { border-top: 1px dashed #000; margin: 5px 0; }
        }
    </style>
</head>
<body>

<nav class="sidebar">
    <div style="font-weight:800; color:var(--primary); font-size:22px; margin-bottom:30px;">⚡ mPOS</div>
    <a href="pos-checkout.html" class="nav-item active">🛒 Checkout</a>
    <a href="pos-inventory.html" class="nav-item">📦 Inventory</a>
    <a href="pos-daily-summary.html" class="nav-item">📜 Daily Closing</a>
    <div style="margin-top:auto; font-size:12px; opacity:0.6;" id="user-display">User</div>
</nav>

<div class="checkout-container">
    <div class="cart-section">
        <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
            <b style="font-size:20px;">ລາຍການສິນຄ້າ</b>
            <input type="text" id="scan-input" placeholder="ສະແກນບາໂຄ້ດ..." autofocus style="padding:10px; border-radius:8px; border:1px solid #ddd;">
        </div>
        <table class="cart-table">
            <thead><tr><th>ສິນຄ້າ</th><th>ລາຄາ</th><th style="text-align:center">ຈຳນວນ</th><th>ລວມ</th><th></th></tr></thead>
            <tbody id="cart-body"></tbody>
        </table>
    </div>

    <div class="summary-section">
        <div style="background:#f0fdf4; padding:15px; border-radius:12px; border:1px dashed #10b981;">
            <div style="font-size:12px; font-weight:bold; color:#065f46;">👤 ຄົ້ນຫາສະມາຊິກ</div>
            <input type="text" id="cust-phone" placeholder="ເບີໂທ..." onkeyup="findCustomer()" style="width:100%; padding:8px; margin-top:5px; border:1px solid #bbf7d0; border-radius:6px;">
            <div id="cust-info" style="display:none; margin-top:10px; font-size:13px;">
                <b id="c-name"></b> | ຄະແນນ: <span id="c-points">0</span>
            </div>
        </div>

        <div class="total-card">
            <div id="disc-row" style="display:none; justify-content:space-between; color:#10b981; margin-bottom:5px;">
                <span>ສ່ວນຫຼຸດ (100pts)</span><span id="disc-val"></span>
            </div>
            <div style="display:flex; justify-content:space-between; font-size:20px; font-weight:800;">
                <span>ລວມທັງໝົດ</span><span id="grand-total">₭0</span>
            </div>
        </div>
        <button id="btn-pay" class="btn-complete" onclick="finishOrder()">ສຳເລັດການຂາຍ</button>
    </div>
</div>

<div id="print-receipt">
    <div style="text-align:center;"><h3>ໃບຮັບເງິນ</h3><p>mPOS System</p></div>
    <div class="r-line"></div>
    <div id="r-header"></div>
    <div class="r-line"></div>
    <div id="r-items"></div>
    <div class="r-line"></div>
    <div id="r-totals"></div>
    <div id="r-loyalty" style="font-size:9px;"></div>
    <div class="r-line"></div>
    <div style="text-align:center;"><svg id="r-barcode"></svg><p>ຂໍຂອບໃຈ</p></div>
</div>

<script>
    const u = "https://zddelixvencundnkccpq.supabase.co"; 
    const k = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpkZGVsaXh2ZW5jdW5kbmtjY3BxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxMjQ1MzMsImV4cCI6MjA5MDcwMDUzM30.-RPvOYMLzftubrpJ4KSVrqL2eNaopjty30_TrnkGpBo";
    const _s = supabase.createClient(u, k);

    let cart = [];
    let selectedCust = null;
    const DISPLAY_ID = "00000000-0000-0000-0000-000000000001";

    const formatLAK = (n) => new Intl.NumberFormat('lo-LA').format(n) + " ₭";

    async function findCustomer() {
        const p = document.getElementById('cust-phone').value;
        if(p.length < 5) { selectedCust = null; renderCart(); return; }
        const { data } = await _s.from('pos_customers').select('*').eq('phone', p).maybeSingle();
        if(data) {
            selectedCust = data;
            document.getElementById('cust-info').style.display = 'block';
            document.getElementById('c-name').innerText = data.name;
            document.getElementById('c-points').innerText = data.points;
        } else {
            selectedCust = null;
            document.getElementById('cust-info').style.display = 'none';
        }
        renderCart();
    }

    document.getElementById('scan-input').addEventListener('keypress', async (e) => {
        if(e.key === 'Enter') {
            const { data } = await _s.from('pos_products').select('*').eq('barcode', e.target.value.trim()).maybeSingle();
            if(data) {
                const ex = cart.find(i => i.barcode === data.barcode);
                if(ex) ex.qty++; else cart.push({...data, qty: 1});
                renderCart();
            } else alert("ບໍ່ພົບສິນຄ້າ!");
            e.target.value = "";
        }
    });

    function renderCart() {
        const body = document.getElementById('cart-body');
        body.innerHTML = cart.map((i, idx) => `
            <tr>
                <td><b>${i.name}</b><br><small>${i.barcode}</small></td>
                <td>${formatLAK(i.retail_price)}</td>
                <td style="text-align:center">${i.qty}</td>
                <td>${formatLAK(i.retail_price * i.qty)}</td>
                <td><button onclick="cart.splice(${idx},1);renderCart()" style="color:red;border:none;background:none;cursor:pointer;">✕</button></td>
            </tr>
        `).join('');

        let sub = cart.reduce((s, i) => s + (i.retail_price * i.qty), 0);
        let disc = (selectedCust && selectedCust.points >= 100) ? 40000 : 0;
        
        document.getElementById('disc-row').style.display = disc > 0 ? 'flex' : 'none';
        document.getElementById('disc-val').innerText = "-" + formatLAK(disc);
        document.getElementById('grand-total').innerText = formatLAK(Math.max(0, sub - disc));
    }

    async function finishOrder() {
        if(cart.length === 0) return;
        const btn = document.getElementById('btn-pay');
        btn.disabled = true;
        btn.innerText = "ກຳລັງຕັດສະຕັອກ...";

        let sub = cart.reduce((s, i) => s + (i.retail_price * i.qty), 0);
        let earned = Math.floor(sub / 50000);
        let disc = 0;
        let finalPoints = 0;

        if(selectedCust) {
            finalPoints = (selectedCust.points || 0) + earned;
            if(finalPoints >= 100) { disc = 40000; finalPoints -= 100; }
        }

        try {
            // 1. DEDUCT INVENTORY (RPC Call)
            for(let item of cart) {
                const { error: rpcErr } = await _s.rpc('deduct_inventory', { 
                    p_barcode: item.barcode, 
                    p_qty: item.qty 
                });
                if(rpcErr) throw rpcErr;
            }

            // 2. SAVE SALE
            const { data: sData, error: sErr } = await _s.from('pos_sales').insert([{
                items: cart, total_amount: Math.max(0, sub - disc), 
                customer_phone: selectedCust ? selectedCust.phone : null, discount_amount: disc
            }]).select();
            if(sErr) throw sErr;

            // 3. UPDATE CUSTOMER
            if(selectedCust) {
                await _s.from('pos_customers').update({ 
                    points: finalPoints, 
                    total_spent: parseFloat(selectedCust.total_spent || 0) + Math.max(0, sub - disc) 
                }).eq('phone', selectedCust.phone);
            }

            // 4. PRINT & RELOAD
            await _s.from('customer_display').update({ status: 'PAID', items: [] }).eq('id', DISPLAY_ID);
            doPrint(sData[0], Math.max(0, sub-disc), disc, finalPoints);

        } catch (e) {
            alert("Error: " + e.message);
            btn.disabled = false;
            btn.innerText = "ສຳເລັດການຂາຍ";
        }
    }

    function doPrint(order, final, disc, pts) {
        const id = order.id.substring(0,8).toUpperCase();
        document.getElementById('r-header').innerHTML = `ID: #${id}<br>ວັນທີ: ${new Date().toLocaleString()}`;
        document.getElementById('r-items').innerHTML = cart.map(i => `
            <div style="display:flex;justify-content:space-between;"><span>${i.name} x${i.qty}</span><span>${(i.retail_price*i.qty).toLocaleString()}</span></div>
        `).join('');
        document.getElementById('r-totals').innerHTML = `
            ${disc > 0 ? `<div style="display:flex;justify-content:space-between;"><span>ສ່ວນຫຼຸດ</span><span>-${disc.toLocaleString()}</span></div>` : ''}
            <div style="display:flex;justify-content:space-between;font-weight:bold;"><span>ລວມທັງໝົດ</span><span>${final.toLocaleString()} ₭</span></div>
        `;
        if(selectedCust) document.getElementById('r-loyalty').innerHTML = `ລູກຄ້າ: ${selectedCust.name}<br>ຄະແນນຄົງເຫຼືອ: ${pts} ⭐`;
        
        JsBarcode("#r-barcode", id, { format: "CODE128", width: 1.5, height: 35, displayValue: false });
        setTimeout(() => { window.print(); location.reload(); }, 600);
    }

    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('user-display').innerText = localStorage.getItem('lsm_user_name') || 'Guest';
        renderCart();
    });
</script>
</body>
</html>
