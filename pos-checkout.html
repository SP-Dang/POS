<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LSM POS | Checkout Elite</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Phetsarath:wght@400;700&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --primary: #10b981; --sidebar: #0f172a; --bg: #f8fafc; --text: #1e293b; --text-muted: #94a3b8; 
            /* 2. DEFINE LAO FONT STACK */
            --lao-font: 'Phetsarath', sans-serif;
        }
        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', var(--lao-font); }
        
        body { margin: 0; display: flex; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

        /* Sidebar Nav */
        .sidebar { width: 260px; background: var(--sidebar); color: white; padding: 30px 20px; display: flex; flex-direction: column; }
        .logo { font-weight: 800; font-size: 22px; color: var(--primary); margin-bottom: 40px; text-decoration: none; display: flex; align-items: center; gap: 10px; }
        .nav-item { padding: 14px 18px; border-radius: 12px; color: #94a3b8; text-decoration: none; margin-bottom: 8px; font-weight: 600; display: flex; align-items: center; gap: 12px; transition: 0.2s; font-size: 14px; }
        .nav-item:hover { background: rgba(255,255,255,0.05); color: white; }
        .nav-item.active { background: var(--primary); color: white; }

        /* Main Layout */
        .checkout-container { flex: 1; display: grid; grid-template-columns: 1fr 420px; height: 100vh; }
        .cart-section { padding: 30px; overflow-y: auto; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .search-box { padding: 12px 15px; border-radius: 10px; border: 1px solid #e2e8f0; width: 250px; outline: none; font-weight: 600; }

        /* Table UI - Optimized for Lao */
        .cart-table { width: 100%; border-collapse: collapse; background: white; border-radius: 16px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.03); }
        .cart-table th { background: #f8fafc; padding: 15px; text-align: left; font-size: 11px; text-transform: uppercase; color: var(--text-muted); }
        .cart-table td { padding: 12px 15px; border-bottom: 1px solid #f1f5f9; line-height: 1.6; }
        .item-name { font-size: 14px; font-weight: 700; max-width: 160px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-family: var(--lao-font); }
        .item-price, .item-total { font-size: 13px; font-weight: 600; text-align: right; }

        /* Right Summary */
        .summary-section { background: white; border-left: 1px solid #e2e8f0; padding: 40px; display: flex; flex-direction: column; }
        .payment-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0; }
        .pay-btn { border: 2px solid #f1f5f9; padding: 15px; border-radius: 12px; cursor: pointer; text-align: center; font-weight: 700; background: white; font-family: var(--lao-font); font-size: 15px; }
        .pay-btn.active { border-color: var(--primary); background: #f0fff4; color: var(--primary); }
        .total-card { background: var(--sidebar); color: white; padding: 25px; border-radius: 20px; margin-top: auto; margin-bottom: 20px; }
        .btn-complete { width: 100%; background: var(--primary); color: white; border: none; padding: 20px; border-radius: 16px; font-size: 18px; font-weight: 800; cursor: pointer; transition: 0.3s; font-family: var(--lao-font); }

        /* 3. PRINT STYLES - Optimized for Thermal + Lao */
        #print-receipt { display: none; }
        @media print {
            body * { visibility: hidden; }
            #print-receipt, #print-receipt * { visibility: visible; }
            #print-receipt { 
                display: block; position: absolute; left: 0; top: 0; width: 58mm; 
                padding: 5px; font-family: var(--lao-font); font-size: 12px; line-height: 1.4; color: black;
            }
            .r-line { border-top: 1px dashed #000; margin: 5px 0; }
            #receipt-barcode { width: 100%; height: auto; }
            .receipt-text-sm { font-size: 10px; }
            .receipt-row { display: flex; justify-content: space-between; margin-bottom: 3px; }
        }
    </style>
</head>
<body>

<nav class="sidebar">
    <div class="logo"><span>⚡</span> mPOS</div>
    
    <a href="index.html" class="nav-item">📊 Dashboard</a> 
    <a href="pos-checkout.html" class="nav-item active">🛒 Checkout</a>
    <a href="pos-orders.html" class="nav-item">📄 Order History</a>
    <a href="pos-inventory.html" class="nav-item">📦 Inventory</a>
    <a href="pos-reports.html" class="nav-item">📊 Reports</a>
    <a href="#" class="nav-item">👥 Customers</a>
    
    <a href="#" class="nav-item" style="margin-top:auto">⚙️ Settings</a>
    
    <div class="user-box" style="padding: 15px; border-top: 1px solid rgba(255,255,255,0.1); margin-top: 10px;">
        <div style="font-size: 0.7rem; color: #94a3b8; margin-bottom: 5px; opacity: 0.7;">LOGGED IN AS:</div>
        <div id="display-user-name" style="font-weight: 600; color: white; margin-bottom: 15px; font-size: 0.9rem;">Loading...</div>
        
        <button onclick="handleLogout()" style="background: rgba(239, 68, 68, 0.2); color: #f87171; border: none; width: 100%; text-align: left; padding: 10px; cursor: pointer; border-radius: 8px; font-weight: 600; font-family: inherit;">
            🚪 Log Out
        </button>
    </div>
</nav>

<div class="checkout-container">
    <section class="cart-section">
        <div class="top-bar">
            <div style="font-weight:800; font-size:20px;">ລາຍການສິນຄ້າ (Cart)</div>
            <input type="text" id="manual-input" class="search-box" placeholder="Scan/Type Barcode" autofocus>
        </div>
        <table class="cart-table">
            <thead>
                <tr>
                    <th>ສິນຄ້າ</th>
                    <th style="text-align:right">ລາຄາ</th>
                    <th style="text-align:center">ຈຳນວນ</th>
                    <th style="text-align:right">ລວມ</th>
                    <th></th>
                </tr>
            </thead>
            <tbody id="cart-body"></tbody>
        </table>
    </section>

    <section class="summary-section">
        <h2 style="margin:0">ການຊຳລະເງິນ (Payment)</h2>
        <div class="payment-grid">
            <button class="pay-btn active" onclick="setPay('ເງິນສົດ (Cash)', this)">ເງິນສົດ</button>
            <button class="pay-btn" onclick="setPay('QR Code', this)">QR Code</button>
            <button class="pay-btn" onclick="setPay('ບັດເຄຣດິດ', this)">ບັດ</button>
            <button class="pay-btn" onclick="setPay('ອື່ນໆ', this)">ອື່ນໆ</button>
        </div>
        <div class="total-card">
            <div style="display:flex; justify-content:space-between; font-size:24px; font-weight:800;">
                <span>ລວມທັງໝົດ</span><span id="grand-total">₭0</span>
            </div>
        </div>
        <button class="btn-complete" onclick="finishOrder()">ສຳເລັດການຂາຍ & ພິມບິນ</button>
    </section>
</div>

<div id="print-receipt">
    <div style="text-align:center;">
        <h3 style="margin:0; font-size: 16px;">ໃບຮັບເງິນ</h3>
        <p class="receipt-text-sm" style="margin:2px 0;">ລະບົບຂາຍ LSM Retail<br>ໂທ: 020xxxxxxx</p>
    </div>
    <div class="r-line"></div>
    <div id="receipt-header-info" class="receipt-text-sm"></div>
    <div class="r-line"></div>
    <div id="receipt-items"></div>
    <div class="r-line"></div>
    <div id="receipt-totals" style="font-weight:bold;"></div>
    <div class="r-line"></div>
    <div style="text-align:center; margin-top:10px;">
        <svg id="receipt-barcode"></svg>
        <p class="receipt-text-sm" style="margin-top:4px;">ຂໍຂອບໃຈທີ່ໃຊ້ບໍລິການ<br>(Thank you for your visit)</p>
    </div>
</div>

<script>
    const u = "https://zddelixvencundnkccpq.supabase.co"; 
    const k = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpkZGVsaXh2ZW5jdW5kbmtjY3BxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxMjQ1MzMsImV4cCI6MjA5MDcwMDUzM30.-RPvOYMLzftubrpJ4KSVrqL2eNaopjty30_TrnkGpBo";
    const _s = supabase.createClient(u, k);

    let cart = [];
    let payMethod = "ເງິນສົດ (Cash)";
    const formatLAK = (n) => new Intl.NumberFormat('lo-LA', { style: 'currency', currency: 'LAK', maximumFractionDigits: 0 }).format(n);

    function initializeUser() {
        const name = localStorage.getItem('lsm_user_name');
        const role = localStorage.getItem('lsm_role');
        const displayDiv = document.getElementById('display-user-name');
        if (!name) window.location.href = 'login.html';
        else if (displayDiv) displayDiv.innerText = name + " (" + role + ")";
    }

    function handleLogout() {
        if (confirm("ທ່ານແນ່ໃຈບໍ່ວ່າຕ້ອງການອອກຈາກລະບົບ?")) {
            localStorage.removeItem('lsm_user_name');
            localStorage.removeItem('lsm_role');
            window.location.href = 'login.html';
        }
    }

    document.getElementById('manual-input').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') { lookupItem(e.target.value); e.target.value = ""; }
    });

    async function lookupItem(code) {
        const { data, error } = await _s.from('pos_products').select('*').eq('barcode', code.trim()).maybeSingle();
        if (data) addItem(data);
        else alert("ບໍ່ພົບສິນຄ້າ (Product not found).");
    }

    function addItem(p) {
        const exists = cart.find(i => i.barcode === p.barcode);
        if (exists) exists.qty++; else cart.push({ ...p, qty: 1 });
        drawCart();
    }

    function drawCart() {
        const body = document.getElementById('cart-body');
        if (cart.length === 0) { 
            body.innerHTML = '<tr><td colspan="5" style="text-align:center; padding:50px; color:#94a3b8;">ບໍ່ມີສິນຄ້າໃນກະຕ່າ</td></tr>'; 
            updateTotals(0); 
            return; 
        }

        body.innerHTML = cart.map((item, idx) => `
            <tr>
                <td>
                    <div class="item-name">${item.name}</div>
                    <div style="font-size:10px; color:#94a3b8;">${item.barcode}</div>
                </td>
                <td class="item-price">${formatLAK(item.retail_price)}</td>
                <td style="text-align:center;">
                    <div style="display:flex; align-items:center; justify-content:center; gap:10px;">
                        <button onclick="adjQty(${idx}, -1)" style="width:28px; height:28px; border-radius:6px; border:1px solid #e2e8f0; background:white; cursor:pointer;">-</button>
                        <span style="font-weight:600;">${item.qty}</span>
                        <button onclick="adjQty(${idx}, 1)" style="width:28px; height:28px; border-radius:6px; border:1px solid #e2e8f0; background:white; cursor:pointer;">+</button>
                    </div>
                </td>
                <td class="item-total">${formatLAK(item.retail_price * item.qty)}</td>
                <td style="text-align:right;">
                    <button onclick="remItem(${idx})" style="border:none; background:none; cursor:pointer; color:#ef4444; font-size:16px;">✕</button>
                </td>
            </tr>
        `).join('');

        const sum = cart.reduce((s, i) => s + (i.retail_price * i.qty), 0);
        updateTotals(sum);
    }

    function adjQty(idx, amount) {
        cart[idx].qty += amount;
        if (cart[idx].qty <= 0) cart.splice(idx, 1);
        drawCart();
    }
    function remItem(idx) { cart.splice(idx, 1); drawCart(); }
    function updateTotals(total) { document.getElementById('grand-total').innerText = formatLAK(total); }
    function setPay(m, b) { payMethod = m; document.querySelectorAll('.pay-btn').forEach(x => x.classList.remove('active')); b.classList.add('active'); }

    async function finishOrder() {
        if (cart.length === 0) return;
        const total = cart.reduce((s, i) => s + (i.retail_price * i.qty), 0);
        
        const { data, error } = await _s.from('pos_sales').insert([{ items: cart, total_amount: total, payment_method: payMethod }]).select();
        if (error) return alert("ຂໍ້ຜິດພາດ: " + error.message);

        const shortID = data[0].id.substring(0, 8).toUpperCase();
        const timeStr = new Date().toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });

        document.getElementById('receipt-header-info').innerHTML = `
            <div style="text-align:center;">
                <b>ລະຫັດບິນ: #${shortID}</b><br>
                ວັນທີ: ${new Date().toLocaleDateString('lo-LA')} | ເວລາ: ${timeStr}
            </div>`;
        
        document.getElementById('receipt-items').innerHTML = cart.map(i => `
            <div class="receipt-row">
                <span>${i.name.substring(0,20)} x${i.qty}</span>
                <span>${(i.retail_price * i.qty).toLocaleString()}</span>
            </div>`).join('');
        
        document.getElementById('receipt-totals').innerHTML = `
            <div class="receipt-row" style="font-size:14px;">
                <span>ລວມທັງໝົດ</span>
                <span>${total.toLocaleString()} LAK</span>
            </div>
            <div class="receipt-text-sm">ການຊຳລະ: ${payMethod}</div>`;

        JsBarcode("#receipt-barcode", shortID, { format: "CODE128", width: 1.2, height: 35, displayValue: false, margin: 0 });

        setTimeout(() => {
            window.print();
            cart = []; 
            drawCart();
        }, 500);
    }

    document.addEventListener('DOMContentLoaded', () => {
        initializeUser();
        drawCart();
    });
</script>
</body>
</html>
