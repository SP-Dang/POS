<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LSM POS | Checkout Elite</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary: #10b981; --sidebar: #0f172a; --bg: #f8fafc; --text: #1e293b; --text-muted: #94a3b8; }
        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { margin: 0; display: flex; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

        /* Sidebar Nav */
        .sidebar { width: 260px; background: var(--sidebar); color: white; padding: 30px 20px; display: flex; flex-direction: column; }
        .logo { font-weight: 800; font-size: 22px; color: var(--primary); margin-bottom: 40px; text-decoration: none; }
        .nav-item { padding: 14px 18px; border-radius: 12px; color: #94a3b8; text-decoration: none; margin-bottom: 8px; font-weight: 600; display: flex; align-items: center; gap: 12px; transition: 0.2s; }
        .nav-item:hover { background: rgba(255,255,255,0.05); color: white; }
        .nav-item.active { background: var(--primary); color: white; }

        /* Main Layout */
        .checkout-container { flex: 1; display: grid; grid-template-columns: 1fr 420px; height: 100vh; }
        .cart-section { padding: 30px; overflow-y: auto; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .search-box { padding: 10px 15px; border-radius: 10px; border: 1px solid #e2e8f0; width: 220px; outline: none; font-weight: 600; }

        /* Table UI */
        .cart-table { width: 100%; border-collapse: collapse; background: white; border-radius: 16px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.03); }
        .cart-table th { background: #f8fafc; padding: 15px; text-align: left; font-size: 11px; text-transform: uppercase; color: var(--text-muted); }
        .cart-table td { padding: 12px 15px; border-bottom: 1px solid #f1f5f9; }
        .item-name { font-size: 13px; font-weight: 700; max-width: 160px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .item-price, .item-total { font-size: 13px; font-weight: 600; text-align: right; }

        /* Right Summary */
        .summary-section { background: white; border-left: 1px solid #e2e8f0; padding: 40px; display: flex; flex-direction: column; }
        .payment-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0; }
        .pay-btn { border: 2px solid #f1f5f9; padding: 15px; border-radius: 12px; cursor: pointer; text-align: center; font-weight: 700; background: white; }
        .pay-btn.active { border-color: var(--primary); background: #f0fff4; color: var(--primary); }
        .total-card { background: var(--sidebar); color: white; padding: 25px; border-radius: 20px; margin-top: auto; }
        .btn-complete { width: 100%; background: var(--primary); color: white; border: none; padding: 20px; border-radius: 16px; font-size: 18px; font-weight: 800; cursor: pointer; transition: 0.3s; }
        .btn-complete:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(16, 185, 129, 0.2); }

        /* PRINT STYLES (Thermal 58mm/80mm) */
        #print-receipt { display: none; }
        @media print {
            body * { visibility: hidden; }
            #print-receipt, #print-receipt * { visibility: visible; }
            #print-receipt { 
                display: block; position: absolute; left: 0; top: 0; width: 58mm; 
                padding: 5px; font-family: 'Courier New', monospace; font-size: 11px; line-height: 1.2; color: black;
            }
            .r-line { border-top: 1px dashed #000; margin: 5px 0; }
            #receipt-barcode { width: 100%; height: auto; }
        }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="logo">LSM ELITE</div>
        <a href="pos-inventory.html" class="nav-item">📦 Inventory</a>
        <a href="pos-checkout.html" class="nav-item active">🛒 Checkout</a>
        <a href="pos-reports.html" class="nav-item">📊 Reports</a>
    </nav>

    <div class="checkout-container">
        <section class="cart-section">
            <div class="top-bar">
                <div style="font-weight:800; font-size:20px;">Current Cart</div>
                <input type="text" id="manual-input" class="search-box" placeholder="Scan/Type Barcode">
            </div>
            <table class="cart-table">
                <thead><tr><th>Product</th><th style="text-align:right">Price</th><th style="text-align:center">Qty</th><th style="text-align:right">Total</th><th></th></tr></thead>
                <tbody id="cart-body"></tbody>
            </table>
        </section>

        <section class="summary-section">
            <h2 style="margin:0">Payment</h2>
            <div class="payment-grid">
                <button class="pay-btn active" onclick="setPay('Cash', this)">Cash</button>
                <button class="pay-btn" onclick="setPay('QR Code', this)">QR Code</button>
                <button class="pay-btn" onclick="setPay('Credit Card', this)">Credit</button>
                <button class="pay-btn" onclick="setPay('Other', this)">Other</button>
            </div>
            <div class="total-card">
                <div style="display:flex; justify-content:space-between; font-size:24px; font-weight:800;">
                    <span>Total</span><span id="grand-total">₭0</span>
                </div>
            </div>
            <button class="btn-complete" onclick="finishOrder()">Complete Sale & Print</button>
        </section>
    </div>

    <div id="print-receipt">
        <div style="text-align:center;">
            <h3 style="margin:0;">ໃບຮັບເງິນ</h3>
            <p style="font-size:9px; margin:2px 0;">ລະບົບຂາຍ ePOS<br>ຮ້ານ..................., ໂທ: 020xxxxxxx</p>
        </div>
        <div class="r-line"></div>
        <div id="receipt-header-info"></div>
        <div class="r-line"></div>
        <div id="receipt-items"></div>
        <div class="r-line"></div>
        <div id="receipt-totals" style="font-weight:bold;"></div>
        <div class="r-line"></div>
        <div style="text-align:center; margin-top:10px;">
            <svg id="receipt-barcode"></svg>
            <p style="font-size:8px; margin-top:4px;">Keep receipt for service warranty</p>
        </div>
    </div>

    <script>
        const u = "https://zddelixvencundnkccpq.supabase.co"; 
        const k = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpkZGVsaXh2ZW5jdW5kbmtjY3BxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxMjQ1MzMsImV4cCI6MjA5MDcwMDUzM30.-RPvOYMLzftubrpJ4KSVrqL2eNaopjty30_TrnkGpBo";
        const _s = supabase.createClient(u, k);

        let cart = [];
        let payMethod = "Cash";
        const formatLAK = (n) => new Intl.NumberFormat('lo-LA', { style: 'currency', currency: 'LAK' }).format(n);

        document.getElementById('manual-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') { lookupItem(e.target.value); e.target.value = ""; }
        });

        async function lookupItem(code) {
            const { data } = await _s.from('pos_products').select('*').eq('barcode', code.trim()).single();
            if (data) addItem(data);
            else alert("Product not found.");
        }

        function addItem(p) {
            const exists = cart.find(i => i.barcode === p.barcode);
            if (exists) exists.qty++; else cart.push({ ...p, qty: 1 });
            drawCart();
        }

        function drawCart() {
            const body = document.getElementById('cart-body');
            if (cart.length === 0) { body.innerHTML = '<tr><td colspan="5" style="text-align:center; padding:50px; color:#94a3b8;">Empty Cart</td></tr>'; updateTotals(0); return; }
            body.innerHTML = cart.map((item, idx) => `
                <tr>
                    <td><div class="item-name">${item.name}</div><div style="font-size:10px; color:#94a3b8;">${item.barcode}</div></td>
                    <td class="item-price">${formatLAK(item.retail_price)}</td>
                    <td style="text-align:center;">${item.qty}</td>
                    <td class="item-total">${formatLAK(item.retail_price * item.qty)}</td>
                    <td style="text-align:right;"><button onclick="remItem(${idx})" style="border:none; background:none; cursor:pointer;">✕</button></td>
                </tr>
            `).join('');
            const sum = cart.reduce((s, i) => s + (i.retail_price * i.qty), 0);
            updateTotals(sum);
        }

        function updateTotals(total) { document.getElementById('grand-total').innerText = formatLAK(total); }
        function remItem(i) { cart.splice(i, 1); drawCart(); }
        function setPay(m, b) { payMethod = m; document.querySelectorAll('.pay-btn').forEach(x => x.classList.remove('active')); b.classList.add('active'); }

        async function finishOrder() {
            if (cart.length === 0) return;
            const total = cart.reduce((s, i) => s + (i.retail_price * i.qty), 0);
            
            // 1. Save to Supabase to get the unique ID
            const { data, error } = await _s.from('pos_sales').insert([{ items: cart, total_amount: total, payment_method: payMethod }]).select();
            if (error) return alert("Database Error: " + error.message);

            const shortID = data[0].id.substring(0, 8).toUpperCase();
            const timeStr = new Date().toLocaleString('en-GB', { hour: '2-digit', minute: '2-digit' });

            // 2. Build Receipt
            document.getElementById('receipt-header-info').innerHTML = `
                <div style="text-align:center; font-size:10px;">
                    <b>ID: #${shortID}</b><br>
                    ${new Date().toLocaleDateString('en-GB')} | ${timeStr}
                </div>
            `;
            document.getElementById('receipt-items').innerHTML = cart.map(i => `
                <div style="display:flex; justify-content:space-between; font-size:10px; margin-bottom:2px;">
                    <span>${i.name.substring(0,18)} x${i.qty}</span>
                    <span>${(i.retail_price * i.qty).toLocaleString()}</span>
                </div>
            `).join('');
            document.getElementById('receipt-totals').innerHTML = `
                <div style="display:flex; justify-content:space-between;"><span>TOTAL</span><span>${total.toLocaleString()} LAK</span></div>
                <div style="font-size:9px;">Payment: ${payMethod}</div>
            `;

            // 3. Generate Visual Barcode
            JsBarcode("#receipt-barcode", shortID, {
                format: "CODE128", width: 1.2, height: 35, displayValue: false, margin: 0
            });

            // 4. Print and Cleanup
            setTimeout(() => {
                window.print();
                for (let item of cart) { _s.rpc('decrement_stock', { row_id: item.id, x: item.qty }); }
                cart = []; drawCart();
            }, 500);
        }
        drawCart();
    </script>
</body>
</html>
