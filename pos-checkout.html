<!DOCTYPE html>
<html lang="lo">
<head>
    <meta charset="UTF-8">
    <title>LSM POS | ຂາຍສິນຄ້າ</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Phetsarath&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #10b981; --sidebar: #0f172a; --bg: #f8fafc; --lao-font: 'Phetsarath', sans-serif; }
        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', var(--lao-font); }
        body { margin: 0; display: flex; background: var(--bg); height: 100vh; }
        
        .sidebar { width: 260px; background: var(--sidebar); color: white; padding: 30px 20px; display: flex; flex-direction: column; }
        .nav-item { padding: 14px 18px; border-radius: 12px; color: #94a3b8; text-decoration: none; margin-bottom: 8px; font-weight: 600; display: flex; align-items: center; gap: 12px; font-size: 14px; }
        .nav-active { background: var(--primary); color: white; }
        
        .main { flex: 1; padding: 40px; overflow-y: auto; display: flex; gap: 30px; }
        .cart-section { flex: 1; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        
        .btn-qr { background: #2563eb; color: white; border: none; padding: 15px 20px; border-radius: 12px; font-weight: 800; font-size: 16px; cursor: pointer; width: 100%; margin-top: 20px; display: flex; justify-content: center; align-items: center; gap: 10px; }
        .btn-qr:hover { background: #1d4ed8; }
        .input-total { width: 100%; padding: 15px; font-size: 24px; font-weight: bold; text-align: right; border: 2px solid #e2e8f0; border-radius: 10px; margin-bottom: 20px; outline: none; }
    </style>
</head>
<body>

<nav class="sidebar">
    <div style="font-weight:800; font-size:22px; color:var(--primary); margin-bottom:40px;">⚡ mPOS</div>
    <a href="index.html" class="nav-item">📊 ແຜງຄວບຄຸມ</a> 
    <a href="pos-checkout.html" class="nav-item nav-active">🛒 ຂາຍສິນຄ້າ</a> 
    <a href="pos-orders.html" class="nav-item">📄 ປະຫວັດການຂາຍ</a>
    <a href="pos-inventory.html" class="nav-item">📦 ຄັງສິນຄ້າ</a>
    <a href="pos-reports.html" class="nav-item">📊 ບົດລາຍງານ</a>
</nav>

<main class="main">
    <div class="cart-section">
        <h2 style="margin-top:0;">ລາຍການຊຳລະເງິນ (Checkout)</h2>
        <p style="color:#64748b;">ໃສ່ຈຳນວນເງິນລວມ ເພື່ອສ້າງ QR Code ໃຫ້ລູກຄ້າສະແກນ.</p>
        
        <label style="font-weight: bold; font-size: 14px; color: #475569;">ຍອດລວມທັງໝົດ (Total LAK):</label>
        <input type="number" id="test-total" class="input-total" value="50000" placeholder="0">

        <button class="btn-qr" onclick="processQRPayment()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><rect x="7" y="7" width="3" height="3"></rect><rect x="14" y="7" width="3" height="3"></rect><rect x="7" y="14" width="3" height="3"></rect><rect x="14" y="14" width="3" height="3"></rect></svg>
            ສ້າງ QR Code ໃຫ້ລູກຄ້າ
        </button>
        <div id="status-msg" style="margin-top:15px; text-align:center; color:var(--primary); font-weight:bold;"></div>
    </div>
</main>

<script>
    // ປ່ຽນເປັນ Key ຂອງທ່ານ
    const u = "https://zddelixvencundnkccpq.supabase.co"; 
    const k = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpkZGVsaXh2ZW5jdW5kbmtjY3BxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxMjQ1MzMsImV4cCI6MjA5MDcwMDUzM30.-RPvOYMLzftubrpJ4KSVrqL2eNaopjty30_TrnkGpBo";
    const _s = supabase.createClient(u, k);

    // 1. ຟັງຊັນສ້າງ CRC16 ໃຫ້ທະນາຄານກວດສອບວ່າ QR ຖືກຕ້ອງ (ຫ້າມປ່ຽນແປງ)
    function crc16(data) {
        let crc = 0xFFFF;
        for (let i = 0; i < data.length; i++) {
            let x = ((crc >> 8) ^ data.charCodeAt(i)) & 0xFF;
            x ^= x >> 4;
            crc = ((crc << 8) ^ (x << 12) ^ (x << 5) ^ x) & 0xFFFF;
        }
        return crc.toString(16).toUpperCase().padStart(4, '0');
    }

    // 2. ຟັງຊັນປະກອບຮ່າງ LaoQR String (ລວມ Merchant ID ຂອງທ່ານແລ້ວ)
    function generateLaoQR(amount) {
        const amountStr = amount.toString();
        
        let payload = "000201010211"; 
        // ນີ້ຄື Merchant ID ບັນຊີຂອງທ່ານທີ່ສະແກນມາໄດ້
        payload += "38670016A00526628466257701082771041802030010324QDZNRPLTFVYIIIOJNUCUZYGC";
        payload += "5303418"; // ສະກຸນເງິນກີບ (LAK)
        
        // ໃສ່ຈຳນວນເງິນແບບ Dynamic
        const amountLength = amountStr.length.toString().padStart(2, '0');
        payload += "54" + amountLength + amountStr; 
        
        payload += "5802LA"; // ປະເທດລາວ
        payload += "6304";   // Checksum marker
        
        const checksum = crc16(payload);
        return payload + checksum;
    }

    // 3. ເມື່ອກົດປຸ່ມ ໃຫ້ສົ່ງຂໍ້ມູນໄປຂຶ້ນຈໍລູກຄ້າ
    async function processQRPayment() {
        const totalInput = document.getElementById('test-total').value;
        const totalAmount = parseFloat(totalInput);
        
        if (!totalAmount || totalAmount <= 0) {
            return alert("ກະລຸນາໃສ່ຈຳນວນເງິນທີ່ຖືກຕ້ອງ");
        }

        const finalQRString = generateLaoQR(totalAmount);

        // ສົ່ງເຂົ້າຖານຂໍ້ມູນ
        const { error } = await _s
            .from('customer_display')
            .insert([{ 
                amount: totalAmount, 
                qr_string: finalQRString,
                status: 'PENDING' 
            }]);

        if (error) {
            console.error("Error:", error);
            alert("ເກີດຂໍ້ຜິດພາດໃນການສົ່ງໄປຈໍລູກຄ້າ: " + error.message);
        } else {
            document.getElementById('status-msg').innerText = "✅ ສົ່ງ QR ໄປໜ້າຈໍລູກຄ້າແລ້ວ!";
            setTimeout(() => { document.getElementById('status-msg').innerText = ""; }, 3000);
        }
    }
</script>
</body>
</html>
