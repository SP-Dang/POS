<!DOCTYPE html>
<html lang="lo">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mPOS | Checkout & Loyalty</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Phetsarath:wght@400;700&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --primary: #10b981; --sidebar: #0f172a; --bg: #f8fafc; --text: #1e293b; --text-muted: #94a3b8; 
            --lao-font: 'Phetsarath', sans-serif;
        }
        * { box-sizing: border-box; font-family: var(--lao-font), 'Plus Jakarta Sans', sans-serif; line-height: 1.5; }
        body { margin: 0; display: flex; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

        /* Sidebar Nav */
        .sidebar { width: 260px; background: var(--sidebar); color: white; padding: 30px 20px; display: flex; flex-direction: column; }
        .logo { font-weight: 800; font-size: 22px; color: var(--primary); margin-bottom: 40px; text-decoration: none; display: flex; align-items: center; gap: 10px; }
        .nav-item { padding: 14px 18px; border-radius: 12px; color: #94a3b8; text-decoration: none; margin-bottom: 8px; font-weight: 600; display: flex; align-items: center; gap: 12px; transition: 0.2s; font-size: 14px; }
        .nav-item:hover { background: rgba(255,255,255,0.05); color: white; }
        .nav-item.active { background: var(--primary); color: white; }

        /* Layout */
        .checkout-container { flex: 1; display: grid; grid-template-columns: 1fr 420px; height: 100vh; }
        .cart-section { padding: 30px; overflow-y: auto; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .search-box { padding: 12px 15px; border-radius: 10px; border: 1px solid #e2e8f0; width: 250px; outline: none; }

        /* Table */
        .cart-table { width: 100%; border-collapse: collapse; background: white; border-radius: 16px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.03); }
        .cart-table th { background: #f8fafc; padding: 15px; text-align: left; font-size: 11px; text-transform: uppercase; color: var(--text-muted); }
        .cart-table td { padding: 12px 15px; border-bottom: 1px solid #f1f5f9; }

        /* Summary Section */
        .summary-section { background: white; border-left: 1px solid #e2e8f0; padding: 30px; display: flex; flex-direction: column; }
        
        /* Loyalty Box */
        .loyalty-box { background: #f0fdf4; border: 1px dashed #10b981; border-radius: 15px; padding: 15px; margin-bottom: 20px; }
        .loyalty-input { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #bbf7d0; margin-top: 8px; outline: none; font-size: 14px; }

        .payment-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; }
        .pay-btn { border: 2px solid #f1f5f9; padding: 12px; border-radius: 12px; cursor: pointer; text-align: center; font-weight: 700; background: white; font-size: 14px; }
        .pay-btn.active { border-color: var(--primary); background: #f0fff4; color: var(--primary); }
        
        .total-card { background: var(--sidebar); color: white; padding: 20px; border-radius: 20px; margin-top: auto; margin-bottom: 15px; }
        .btn-complete { width: 100%; background: var(--primary); color: white; border: none; padding: 18px; border-radius: 16px; font-size: 18px; font-weight: 800; cursor: pointer; }

        /* Receipt Print */
        #print-receipt { display: none; }
        @media print {
            body * { visibility: hidden; }
            #print-receipt, #print-receipt * { visibility: visible; }
            #print-receipt { display: block; position: absolute; left: 0; top: 0; width: 58mm; padding: 2mm; font-size: 10px; line-height: 1.4; color: black; }
            .r-line { border-top: 1px dashed #000; margin: 4px 0; }
            .receipt-row { display: flex; justify-content: space-between; margin-bottom: 2px; }
        }
    </style>
</head>
<body>

<nav class="sidebar">
    <div class="logo"><span>⚡</span> mPOS</div>
    <a href="index.html" class="nav-item">📊 Dashboard</a> 
    <a href="pos-checkout.html" class="nav-item active">🛒 Checkout</a>
    <a href="pos-orders.html" class="nav-item">📄 Order History</a>
    <a href="pos-customers.html" class="nav-item">👥 Customers</a>
    <a href="pos-daily-summary.html" class="nav-item">📜 Daily Closing</a>
    
    <div class="user-box" style="padding: 15px; border-top: 1px solid rgba(255,255,255,0.1); margin-top: auto;">
        <div id="display-user-name" style="font-weight: 600; color: white; font-size: 0.8rem;">Loading...</div>
        <button onclick="handleLogout()" style="background:none; color:#f87171; border:none; padding:5px 0; cursor:pointer; font-size:12px;">🚪 Log Out</button>
    </div>
</nav>

<div class="checkout-container">
    <section class="cart-section">
        <div class="top-bar">
            <div style="font-weight:800; font-size:20px;">ລາຍການສິນຄ້າ (Cart)</div>
            <input type="text" id="manual-input" class="search-box" placeholder="Scan Barcode ທີ່ນີ້..." autofocus>
        </div>
        <table class="cart-table">
            <thead>
                <tr>
                    <th>ສິນຄ້າ</th>
                    <th style="text-align:right">ລາຄາ</th>
                    <th style="text-align:center">ຈຳນວນ</th>
                    <th style="text-align:right">ລວມ</th>
                    <th></th>
                </tr>
            </thead>
            <tbody id="cart-body"></tbody>
        </table>
    </section>

    <section class="summary-section">
        <h2 style="margin:0; font-size:18px;">ຊຳລະເງິນ & ສະມາຊິກ</h2>
        
        <div class="loyalty-box">
            <div style="font-size:12px; font-weight:800; color:#065f46;">👤 ຄົ້ນຫາສະມາຊິກ (ເບີໂທ)</div>
            <input type="text" id="cust-search" class="loyalty-input" placeholder="020..." onkeyup="searchCustomer()">
            <div id="cust-info" style="margin-top:10px; font-size:13px; display:none; border-top: 1px solid #bbf7d0; padding-top:8px;">
                <b id="res-name" style="color:#065f46;">---</b> <br>
                <span>ຄະແນນປັດຈຸບັນ: <span id="res-points" style="font-weight:800; color:#10b981;">0</span> ⭐</span>
            </div>
        </div>

        <div class="payment-grid">
            <button class="pay-btn active" onclick="setPay('ເງິນສົດ (Cash)', this)">ເງິນສົດ</button>
            <button class="pay-btn" onclick="setPay('QR Code', this)">QR Code</button>
        </div>

        <div class="total-card">
            <div style="display:flex; justify-content:space-between; font-size:20px; font-weight:800;">
                <span>ລວມທັງໝົດ</span><span id="grand-total">₭0</span>
            </div>
            <div style="display:flex; justify-content:space-between; font-size:12px; margin-top:8px; opacity:0.9;">
                <span>ຄະແນນທີ່ຈະໄດ້ຮັບ</span><span id="earned-points">+0 ⭐</span>
            </div>
        </div>
        
        <button class="btn-complete" onclick="finishOrder()">ສຳເລັດການຂາຍ</button>
    </section>
</div>

<div id="print-receipt">
    <div style="text-align:center;">
        <h3 style="margin:0;">ໃບຮັບເງິນ mPOS</h3>
        <p id="receipt-shop-info" style="margin:2px 0;">ຮ້ານຂອງຂ້ອຍ</p>
    </div>
    <div class="r-line"></div>
    <div id="receipt-header-info"></div>
    <div class="r-line"></div>
    <div id="receipt-items"></div>
    <div class="r-line"></div>
    <div id="receipt-totals" style="font-weight:bold;"></div>
    <div id="receipt-loyalty" style="font-size:9px; margin-top:5px; color:#444;"></div>
    <div class="r-line"></div>
    <div style="text-align:center;">
        <svg id="receipt-barcode"></svg>
        <p style="margin-top:5px;">ຂໍຂອບໃຈ (Thank you)</p>
    </div>
</div>

<script>
    const u = "https://zddelixvencundnkccpq.supabase.co"; 
    const k = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpkZGVsaXh2ZW5jdW5kbmtjY3BxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxMjQ1MzMsImV4cCI6MjA5MDcwMDUzM30.-RPvOYMLzftubrpJ4KSVrqL2eNaopjty30_TrnkGpBo";
    const _s = supabase.createClient(u, k);

    let cart = [];
    let payMethod = "ເງິນສົດ (Cash)";
    let selectedCustomer = null;
    const formatLAK = (n) => new Intl.NumberFormat('lo-LA').format(n) + " ₭";

    // 1. ຄົ້ນຫາລູກຄ້າ
    async function searchCustomer() {
        const phone = document.getElementById('cust-search').value.trim();
        if (phone.length < 5) {
            document.getElementById('cust-info').style.display = 'none';
            selectedCustomer = null;
            return;
        }

        const { data, error } = await _s.from('pos_customers').select('*').eq('phone', phone).maybeSingle();

        if (data) {
            selectedCustomer = data;
            document.getElementById('cust-info').style.display = 'block';
            document.getElementById('res-name').innerText = "👤 " + data.name;
            document.getElementById('res-points').innerText = data.points.toLocaleString();
        } else {
            selectedCustomer = null;
            document.getElementById('cust-info').style.display = 'none';
        }
    }

    // 2. Scan ສິນຄ້າ
    document.getElementById('manual-input').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') { lookupItem(e.target.value); e.target.value = ""; }
    });

    async function lookupItem(code) {
        const { data, error } = await _s.from('pos_products').select('*').eq('barcode', code.trim()).maybeSingle();
        if (data) {
            const exists = cart.find(i => i.barcode === data.barcode);
            if (exists) exists.qty++; else cart.push({ ...data, qty: 1 });
            drawCart();
        } else alert("ບໍ່ພົບສິນຄ້າ.");
    }

    function drawCart() {
        const body = document.getElementById('cart-body');
        if (cart.length === 0) {
            body.innerHTML = '<tr><td colspan="5" style="text-align:center; padding:50px; color:#94a3b8;">ກະຕ່າວ່າງເປົ່າ</td></tr>';
            updateTotals(0);
            return;
        }
        body.innerHTML = cart.map((item, idx) => `
            <tr>
                <td><div style="font-weight:700;">${item.name}</div></td>
                <td style="text-align:right">${formatLAK(item.retail_price)}</td>
                <td style="text-align:center;">
                    <button onclick="adjQty(${idx}, -1)" style="border:1px solid #ddd; background:white; padding:2px 8px;">-</button>
                    <span style="margin:0 10px; font-weight:600;">${item.qty}</span>
                    <button onclick="adjQty(${idx}, 1)" style="border:1px solid #ddd; background:white; padding:2px 8px;">+</button>
                </td>
                <td style="text-align:right">${formatLAK(item.retail_price * item.qty)}</td>
                <td style="text-align:right;"><button onclick="remItem(${idx})" style="color:red; border:none; background:none; cursor:pointer;">✕</button></td>
            </tr>`).join('');
        
        const total = cart.reduce((s, i) => s + (i.retail_price * i.qty), 0);
        updateTotals(total);
    }

    function updateTotals(total) {
        document.getElementById('grand-total').innerText = formatLAK(total);
        const points = Math.floor(total / 10000); // 10,000 LAK = 1 Point
        document.getElementById('earned-points').innerText = `+${points.toLocaleString()} ⭐`;
    }

    function adjQty(idx, n) { 
        cart[idx].qty += n; 
        if (cart[idx].qty <= 0) cart.splice(idx, 1); 
        drawCart(); 
    }
    
    function remItem(idx) { cart.splice(idx, 1); drawCart(); }
    
    function setPay(m, b) {
        payMethod = m;
        document.querySelectorAll('.pay-btn').forEach(x => x.classList.remove('active'));
        b.classList.add('active');
    }

    // 3. ບັນທຶກ ແລະ ອັບເດດ Loyalty
    async function finishOrder() {
        if (cart.length === 0) return;
        const total = cart.reduce((s, i) => s + (i.retail_price * i.qty), 0);
        const earned = Math.floor(total / 10000);

        // A. ບັນທຶກບິນຂາຍ
        const { data, error } = await _s.from('pos_sales').insert([{ 
            items: cart, 
            total_amount: total, 
            payment_method: payMethod,
            customer_phone: selectedCustomer ? selectedCustomer.phone : null 
        }]).select();

        if (error) return alert("Error: " + error.message);

        // B. ອັບເດດຄະແນນລູກຄ້າ (ຖ້າມີ)
        if (selectedCustomer) {
            const newPoints = selectedCustomer.points + earned;
            const newSpent = parseFloat(selectedCustomer.total_spent) + total;
            
            await _s.from('pos_customers')
                .update({ points: newPoints, total_spent: newSpent })
                .eq('phone', selectedCustomer.phone);
        }

        // C. ພິມບິນ
        printReceipt(data[0], total, earned);
    }

    function printReceipt(order, total, earned) {
        const shortID = order.id.substring(0, 8).toUpperCase();
        document.getElementById('receipt-header-info').innerHTML = `ບິນ: #${shortID}<br>ວັນທີ: ${new Date().toLocaleString('lo-LA')}`;
        document.getElementById('receipt-items').innerHTML = cart.map(i => `
            <div class="receipt-row"><span>${i.name} x${i.qty}</span><span>${(i.retail_price * i.qty).toLocaleString()}</span></div>
        `).join('');
        document.getElementById('receipt-totals').innerHTML = `<div class="receipt-row"><span>ລວມທັງໝົດ</span><span>${total.toLocaleString()} LAK</span></div>`;
        
        if (selectedCustomer) {
            document.getElementById('receipt-loyalty').innerHTML = `ລູກຄ້າ: ${selectedCustomer.name}<br>ຄະແນນບິນນີ້: +${earned} | ຄະແນນລວມ: ${selectedCustomer.points + earned}`;
        } else {
            document.getElementById('receipt-loyalty').innerHTML = "";
        }

        JsBarcode("#receipt-barcode", shortID, { format: "CODE128", width: 1.5, height: 40, displayValue: false });

        setTimeout(() => {
            window.print();
            location.reload();
        }, 500);
    }

    function initializeUser() {
        const name = localStorage.getItem('lsm_user_name');
        if (!name) window.location.href = 'login.html';
        document.getElementById('display-user-name').innerText = name;
    }

    function handleLogout() {
        localStorage.clear();
        window.location.href = 'login.html';
    }

    document.addEventListener('DOMContentLoaded', () => {
        initializeUser();
        drawCart();
    });
</script>
</body>
</html>
