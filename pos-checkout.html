<!DOCTYPE html>
<html lang="lo">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mPOS | Checkout & Sync</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Phetsarath:wght@400;700&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --primary: #10b981; --sidebar: #0f172a; --bg: #f8fafc; --text: #1e293b; --text-muted: #94a3b8; 
            --lao-font: 'Phetsarath', sans-serif;
        }
        * { box-sizing: border-box; font-family: var(--lao-font), sans-serif; line-height: 1.5; }
        
        /* Layout Grid ໃໝ່ຕາມທີ່ທ່ານຕ້ອງການ */
        body { 
            margin: 0; 
            display: grid; 
            grid-template-columns: 200px 1fr 320px; 
            background: var(--bg); 
            color: var(--text); 
            height: 100vh; 
            overflow: hidden; 
        }

        /* Sidebar Nav (ແຄບລົງ) */
        .sidebar { background: var(--sidebar); color: white; padding: 25px 15px; display: flex; flex-direction: column; border-right: 1px solid rgba(255,255,255,0.05); }
        .logo { font-weight: 800; font-size: 20px; color: var(--primary); margin-bottom: 30px; text-decoration: none; display: flex; align-items: center; gap: 8px; }
        .nav-item { padding: 12px 14px; border-radius: 10px; color: #94a3b8; text-decoration: none; margin-bottom: 5px; font-weight: 600; display: flex; align-items: center; gap: 10px; font-size: 13px; }
        .nav-item.active { background: var(--primary); color: white; }

        /* Cart Section (ກວ້າງຂຶ້ນ) */
        .cart-section { padding: 25px; overflow-y: auto; }
        .cart-table { width: 100%; border-collapse: collapse; background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .cart-table th { background: #f8fafc; padding: 12px; text-align: left; font-size: 11px; color: var(--text-muted); }
        .cart-table td { padding: 12px; border-bottom: 1px solid #f1f5f9; }

        /* Summary Section (ແຄບລົງ) */
        .summary-section { background: white; border-left: 1px solid #e2e8f0; padding: 25px; display: flex; flex-direction: column; }
        .pay-btn { border: 2px solid #f1f5f9; padding: 12px; border-radius: 10px; cursor: pointer; font-weight: 700; background: white; margin-bottom: 8px; width: 100%; text-align: center; }
        .pay-btn.active { border-color: var(--primary); background: #f0fff4; color: var(--primary); }
        .total-card { background: var(--sidebar); color: white; padding: 20px; border-radius: 15px; margin-top: auto; }

        /* Print Style */
        #print-receipt { display: none; }
        @media print {
            body * { visibility: hidden; }
            #print-receipt, #print-receipt * { visibility: visible; }
            #print-receipt { display: block; position: absolute; left: 0; top: 0; width: 58mm; padding: 2mm; font-size: 10px; }
        }
    </style>
</head>
<body>

<nav class="sidebar">
    <div class="logo">⚡ mPOS</div>
    <a href="index.html" class="nav-item">📊 Dashboard</a> 
    <a href="pos-checkout.html" class="nav-item active">🛒 Checkout</a>
    <a href="pos-orders.html" class="nav-item">📄 Orders</a>
    <div id="display-user-name" style="margin-top:auto; font-size:11px; opacity:0.7;">User</div>
</nav>

<section class="cart-section">
    <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
        <h2 style="margin:0">ລາຍການສິນຄ້າ</h2>
        <input type="text" id="manual-input" placeholder="Scan Barcode..." style="padding:8px; border-radius:8px; border:1px solid #ddd;" autofocus>
    </div>
    <table class="cart-table">
        <thead>
            <tr><th>ສິນຄ້າ</th><th style="text-align:right">ລາຄາ</th><th style="text-align:center">ຈຳນວນ</th><th style="text-align:right">ລວມ</th><th></th></tr>
        </thead>
        <tbody id="cart-body"></tbody>
    </table>
</section>

<section class="summary-section">
    <h3>ການຊຳລະເງິນ</h3>
    <button class="pay-btn active" onclick="setPay('Cash', this)">ເງິນສົດ (Cash)</button>
    <button class="pay-btn" onclick="setPay('QR Code', this)">QR Code</button>
    
    <div class="total-card">
        <div style="display:flex; justify-content:space-between; font-size:20px; font-weight:800;">
            <span>ລວມ</span><span id="grand-total">0 ₭</span>
        </div>
    </div>
    <button onclick="finishOrder()" style="width:100%; background:var(--primary); color:white; border:none; padding:15px; border-radius:12px; margin-top:15px; font-weight:800; cursor:pointer;">ສຳເລັດການຂາຍ</button>
</section>

<div id="print-receipt">
    <div style="text-align:center;"><h3>RECEIPT</h3></div>
    <div id="receipt-items"></div>
    <div id="receipt-totals" style="border-top:1px dashed #000; padding-top:5px; font-weight:bold;"></div>
</div>

<script>
    const u = "https://zddelixvencundnkccpq.supabase.co"; 
    const k = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpkZGVsaXh2ZW5jdW5kbmtjY3BxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxMjQ1MzMsImV4cCI6MjA5MDcwMDUzM30.-RPvOYMLzftubrpJ4KSVrqL2eNaopjty30_TrnkGpBo";
    const _s = supabase.createClient(u, k);

    let cart = [];
    let payMethod = "Cash";
    const DISPLAY_ID = "00000000-0000-0000-0000-000000000001";

    // 1. ຟັງຊັນ Sync ຂໍ້ມູນໄປທີ່ Customer View (ແກ້ໄຂໃຫ້ສົ່ງ items ໄປດ້ວຍ)
    async function syncToCustomerDisplay(qrString = "") {
        const total = cart.reduce((s, i) => s + (i.retail_price * i.qty), 0);
        await _s.from('customer_display').upsert([{ 
            id: DISPLAY_ID, 
            amount: total, 
            qr_string: qrString, 
            status: 'PENDING',
            items: cart // ສົ່ງລາຍການໃນກະຕ່າໄປໃຫ້ຝັ່ງລູກຄ້າເຫັນ
        }]);
    }

    function crc16(data) {
        let crc = 0xFFFF;
        for (let i = 0; i < data.length; i++) {
            let x = ((crc >> 8) ^ data.charCodeAt(i)) & 0xFF;
            x ^= x >> 4;
            crc = ((crc << 8) ^ (x << 12) ^ (x << 5) ^ x) & 0xFFFF;
        }
        return crc.toString(16).toUpperCase().padStart(4, '0');
    }

    async function updateQR() {
        const sum = cart.reduce((s, i) => s + (i.retail_price * i.qty), 0);
        if (payMethod === 'QR Code' && sum > 0) {
            const amountStr = Math.round(sum).toString();
            let payload = "00020101021138670016A00526628466257701082771041802030010324QDZNRPLTFVYIIIOJNUCUZYGC5303418";
            payload += "54" + amountStr.length.toString().padStart(2, '0') + amountStr; 
            payload += "5802LA6304";
            const finalQR = payload + crc16(payload);
            await syncToCustomerDisplay(finalQR);
        } else {
            await syncToCustomerDisplay(""); // ຖ້າຈ່າຍເງິນສົດ ໃຫ້ລຶບ QR ອອກແຕ່ຍັງສະແດງ Items
        }
    }

    function setPay(m, b) {
        payMethod = m;
        document.querySelectorAll('.pay-btn').forEach(x => x.classList.remove('active'));
        b.classList.add('active');
        updateQR();
    }

    document.getElementById('manual-input').addEventListener('keypress', async (e) => {
        if (e.key === 'Enter') {
            const { data } = await _s.from('pos_products').select('*').eq('barcode', e.target.value.trim()).maybeSingle();
            if (data) {
                const exists = cart.find(i => i.barcode === data.barcode);
                if (exists) exists.qty++; else cart.push({ ...data, qty: 1 });
                drawCart();
                updateQR();
            }
            e.target.value = "";
        }
    });

    function drawCart() {
        const body = document.getElementById('cart-body');
        body.innerHTML = cart.map((item, idx) => `
            <tr>
                <td><b>${item.name}</b></td>
                <td style="text-align:right">${item.retail_price.toLocaleString()}</td>
                <td style="text-align:center">${item.qty}</td>
                <td style="text-align:right"><b>${(item.retail_price * item.qty).toLocaleString()}</b></td>
                <td><button onclick="cart.splice(${idx},1); drawCart(); updateQR();">✕</button></td>
            </tr>`).join('');
        document.getElementById('grand-total').innerText = cart.reduce((s, i) => s + (i.retail_price * i.qty), 0).toLocaleString() + " ₭";
    }

    async function finishOrder() {
        if (cart.length === 0) return;
        const total = cart.reduce((s, i) => s + (i.retail_price * i.qty), 0);
        await _s.from('pos_sales').insert([{ items: cart, total_amount: total, payment_method: payMethod }]);
        
        // ເຄຼຍໜ້າຈໍລູກຄ້າ
        await _s.from('customer_display').update({ status: 'PAID', qr_string: "", items: [] }).eq('id', DISPLAY_ID);
        
        alert("ການຂາຍສຳເລັດ!");
        cart = [];
        drawCart();
        updateQR();
    }
</script>
</body>
</html>
