<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LSM Retail | Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #10b981; --sidebar: #0f172a; --bg: #f8fafc; }
        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { margin: 0; background: var(--bg); height: 100vh; display: flex; justify-content: center; align-items: center; }
        .login-card { background: white; padding: 40px; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        .logo { font-weight: 800; font-size: 28px; color: var(--primary); margin-bottom: 20px; }
        select, input { width: 100%; padding: 14px; margin-bottom: 20px; border: 1px solid #e2e8f0; border-radius: 12px; font-size: 16px; font-weight: 600; }
        .btn-login { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 14px; font-weight: 800; cursor: pointer; width: 100%; }
        #msg { margin-top: 20px; font-weight: 600; font-size: 14px; min-height: 20px; }
    </style>
</head>
<body>

<div class="login-card">
    <div class="logo">LSM RETAIL</div>
    <select id="user-select">
        <option value="GM">General Manager</option>
        <option value="Somsak">Somsak</option>
        <option value="Keo">Keo</option>
        <option value="Bouapha">Bouapha</option>
    </select>
    <input type="password" id="pin-input" placeholder="Enter PIN" maxlength="4">
    <button class="btn-login" onclick="doLogin()">SIGN IN</button>
    <div id="msg"></div>
</div>

<script>
    async function doLogin() {
        const name = document.getElementById('user-select').value;
        const pin = document.getElementById('pin-input').value;
        const msg = document.getElementById('msg');
        
        // This is your specific Supabase URL and Key
        const url = `https://lophnkwkmkgkrdfxgtmt.supabase.co/rest/v1/staff?name=eq.${name}&pin=eq.${pin}&select=*`;
        const key = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxvcGhua3drbWtna3JkZnhndG10Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3ODIxNTQsImV4cCI6MjA5MDM1ODE1NH0.ITu8VpDZy1pnJgafBYkSVOGTK0PHKkD7YN0bdH2UT_I";

        msg.style.color = "#64748b";
        msg.innerText = "Checking...";

        try {
            const response = await fetch(url, {
                method: 'GET',
                headers: { 'apikey': key, 'Authorization': `Bearer ${key}` }
            });

            const data = await response.json();

            if (data.length > 0) {
                const user = data[0];
                localStorage.setItem('lsm_user_name', user.name);
                localStorage.setItem('lsm_role', user.role);
                
                msg.style.color = "#10b981";
                msg.innerText = "✅ Success! Redirecting...";

                setTimeout(() => {
                    window.location.href = (user.role === 'GM') ? 'pos-inventory.html' : 'pos-checkout.html';
                }, 1000);
            } else {
                msg.style.color = "#ef4444";
                msg.innerText = "❌ Incorrect PIN for " + name;
            }
        } catch (err) {
            console.error(err);
            msg.style.color = "#ef4444";
            msg.innerText = "⚠️ Connection Blocked. Check CORS settings.";
        }
    }
</script>
</body>
</html>
