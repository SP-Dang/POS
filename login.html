<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LSM Retail | Secure Access</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #10b981; --sidebar: #0f172a; --bg: #f8fafc; }
        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { margin: 0; background: var(--bg); height: 100vh; display: flex; justify-content: center; align-items: center; }
        .login-card { background: white; padding: 40px; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        .logo { font-weight: 800; font-size: 28px; color: var(--primary); margin-bottom: 10px; }
        label { display: block; text-align: left; font-size: 11px; font-weight: 800; color: #64748b; margin-bottom: 8px; text-transform: uppercase; }
        select, input { width: 100%; padding: 14px; margin-bottom: 20px; border: 1px solid #e2e8f0; border-radius: 12px; font-size: 16px; }
        .btn-login { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 14px; font-weight: 800; cursor: pointer; }
        #msg { margin-top: 20px; font-weight: 600; font-size: 14px; }
    </style>
</head>
<body>

<div class="login-card">
    <div class="logo">LSM RETAIL</div>
    <p>Please enter your 4-digit PIN</p>

    <label>Staff Member</label>
    <select id="user-select">
        <option value="GM">General Manager</option>
        <option value="Somsak">Somsak</option>
        <option value="Keo">Keo</option>
        <option value="Bouapha">Bouapha</option>
    </select>

    <label>Security PIN</label>
    <input type="password" id="pin-input" placeholder="••••" maxlength="4">

    <button class="btn-login" id="login-btn" onclick="handleLogin()">ACCESS SYSTEM</button>
    <div id="msg"></div>
</div>

<script>
    async function handleLogin() {
        const user = document.getElementById('user-select').value;
        const pin = document.getElementById('pin-input').value;
        const btn = document.getElementById('login-btn');
        const msg = document.getElementById('msg');

        const u = "https://lophnkwkmkgkrdfxgtmt.supabase.co/rest/v1/staff";
        const k = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxvcGhua3drbWtna3JkZnhndG10Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3ODIxNTQsImV4cCI6MjA5MDM1ODE1NH0.ITu8VpDZy1pnJgafBYkSVOGTK0PHKkD7YN0bdH2UT_I";

        btn.disabled = true;
        btn.innerText = "VERIFYING...";

        try {
            // Direct FETCH call - Browsers trust this more than the Supabase Library
            const response = await fetch(`${u}?name=eq.${user}&pin=eq.${pin}&select=*`, {
                method: 'GET',
                headers: {
                    'apikey': k,
                    'Authorization': `Bearer ${k}`
                }
            });

            const data = await response.json();

            if (data && data.length > 0) {
                const staff = data[0];
                localStorage.setItem('lsm_user_name', staff.name);
                localStorage.setItem('lsm_role', staff.role);
                
                msg.style.color = "#10b981";
                msg.innerText = "✅ Welcome, " + staff.name;

                setTimeout(() => {
                    window.location.href = (staff.role === 'GM') ? 'pos-inventory.html' : 'pos-checkout.html';
                }, 800);
            } else {
                msg.style.color = "#ef4444";
                msg.innerText = "❌ Invalid PIN for " + user;
                btn.disabled = false;
                btn.innerText = "ACCESS SYSTEM";
            }
        } catch (err) {
            console.error(err);
            msg.innerText = "Connection Blocked. Please check internet.";
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
