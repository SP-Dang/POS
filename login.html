<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LSM Retail | Secure Login</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #10b981; --sidebar: #0f172a; --bg: #f8fafc; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 40px; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.08); width: 100%; max-width: 380px; text-align: center; border: 1px solid #f1f5f9; }
        .logo { font-weight: 800; font-size: 28px; color: var(--primary); margin-bottom: 10px; }
        p { color: #94a3b8; font-size: 14px; margin-bottom: 25px; }
        label { display: block; text-align: left; font-size: 11px; font-weight: 800; color: #64748b; margin-bottom: 8px; text-transform: uppercase; }
        select, input { width: 100%; padding: 14px; margin-bottom: 20px; border: 1px solid #e2e8f0; border-radius: 12px; font-size: 16px; font-weight: 600; outline: none; }
        .btn-login { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 14px; font-weight: 800; cursor: pointer; font-size: 16px; transition: 0.3s; }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 8px 15px rgba(16, 185, 129, 0.2); }
        #msg { margin-top: 15px; font-size: 13px; font-weight: bold; }
    </style>
</head>
<body>

<div class="login-card">
    <div class="logo">LSM RETAIL</div>
    <p>Select your role and enter PIN</p>

    <label>Position</label>
    <select id="role-select">
        <option value="GM">GENERAL MANAGER</option>
        <option value="CASHIER">CASHIER (Somsak/Keo)</option>
    </select>

    <label>Security PIN</label>
    <input type="password" id="pin-input" placeholder="Enter PIN" maxlength="4" inputmode="numeric">

    <button class="btn-login" id="login-btn" onclick="handleLogin()">SECURE LOGIN</button>
    <div id="msg"></div>
</div>

<script>
    const u = "https://lophnkwkmkgkrdfxgtmt.supabase.co"; 
    const k = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxvcGhua3drbWtna3JkZnhndG10Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3ODIxNTQsImV4cCI6MjA5MDM1ODE1NH0.ITu8VpDZy1pnJgafBYkSVOGTK0PHKkD7YN0bdH2UT_I";
    
    // Initialize exactly like the Garage system
    const _s = supabase.createClient(u, k);

    async function handleLogin() {
        const role = document.getElementById('role-select').value;
        const pin = document.getElementById('pin-input').value.trim(); // Trim input spaces
        const btn = document.getElementById('login-btn');
        const msg = document.getElementById('msg');

        btn.disabled = true;
        btn.innerText = "VERIFYING...";

        try {
            // Logic match: Garage search style
            const { data, error } = await _s
                .from('staff')
                .select('name, role')
                .eq('role', role)
                .eq('pin', pin)
                .maybeSingle();

            if (error) {
                alert("DATABASE ERROR: " + error.message);
                throw error;
            }

            if (data) {
                localStorage.setItem('lsm_user_name', data.name);
                localStorage.setItem('lsm_role', data.role);
                msg.style.color = "#10b981";
                msg.innerText = "✅ Welcome, " + data.name;

                setTimeout(() => {
                    window.location.href = (data.role === 'GM') ? 'pos-inventory.html' : 'pos-checkout.html';
                }, 800);
            } else {
                // This alert tells us if the match failed
                alert("LOGIN FAILED: No user found with Role [" + role + "] and PIN [" + pin + "]. Check your Supabase table data!");
                msg.style.color = "#ef4444";
                msg.innerText = "❌ Invalid PIN";
                btn.disabled = false;
                btn.innerText = "SECURE LOGIN";
            }
        } catch (err) {
            alert("SYSTEM ERROR: " + err.message);
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
