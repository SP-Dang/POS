<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>mPOS | Order History & Returns</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Phetsarath&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #10b981; --danger: #ef4444; --sidebar: #0f172a; --bg: #f8fafc; --lao-font: 'Phetsarath', sans-serif; }
        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', var(--lao-font); }
        body { margin: 0; display: flex; background: var(--bg); height: 100vh; }
        
        .sidebar { width: 260px; background: var(--sidebar); color: white; padding: 30px 20px; display: flex; flex-direction: column; }
        .nav-item { padding: 14px 18px; border-radius: 12px; color: #94a3b8; text-decoration: none; margin-bottom: 8px; font-weight: 600; display: flex; align-items: center; gap: 12px; font-size: 14px; }
        .nav-active { background: var(--primary); color: white; }
        
        .main { flex: 1; padding: 40px; overflow-y: auto; }
        .search-container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); margin-bottom: 30px; display: flex; gap: 15px; align-items: center; }
        .search-input { flex: 1; padding: 15px; border: 2px solid #f1f5f9; border-radius: 12px; font-size: 16px; outline: none; }
        .search-input:focus { border-color: var(--primary); }

        .order-card { background: white; border-radius: 20px; padding: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .item-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #f1f5f9; }
        
        /* ຕົບແຕ່ງປຸ່ມ */
        .btn-return { background: #fee2e2; color: #b91c1c; border: none; padding: 12px 20px; border-radius: 8px; font-weight: 700; cursor: pointer; margin-top: 15px; transition: 0.2s; }
        .btn-return:hover { background: #fecaca; }
        
        .btn-print { background: #e0f2fe; color: #0369a1; border: none; padding: 12px 20px; border-radius: 8px; font-weight: 700; cursor: pointer; margin-top: 15px; margin-right: 10px; transition: 0.2s; }
        .btn-print:hover { background: #bae6fd; }
        
        .badge { padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 700; }
        .badge-success { background: #dcfce7; color: #166534; }

        /* ສ່ວນຂອງການ Print */
        #print-receipt { display: none; }
        @media print {
            body * { visibility: hidden; }
            #print-receipt, #print-receipt * { visibility: visible; }
            #print-receipt { display: block; position: absolute; left: 0; top: 0; width: 58mm; padding: 2mm; font-size: 10px; line-height: 1.4; color: black; }
            .r-line { border-top: 1px dashed #000; margin: 4px 0; }
            .receipt-row { display: flex; justify-content: space-between; gap: 5px; margin-bottom: 3px; }
        }
    </style>
</head>
<body>

<nav class="sidebar">
    <div class="logo"><span>⚡</span> mPOS</div>
    
    <a href="index.html" class="nav-item">📊 Dashboard</a> 
    <a href="pos-checkout.html" class="nav-item active">🛒 ຂາຍສິນຄ້າ</a> 
    <a href="pos-orders.html" class="nav-item">📄 ປະຫວັດການສັ່ງຊື້</a>
    <a href="pos-inventory.html" class="nav-item">📦 ຄັງສິນຄ້າ</a>
    <a href="pos-daily-summary.html" class="nav-item">📜 ປິດຍອດປະຈຳວັນ</a>
    <a href="pos-reports.html" class="nav-item">📊 ລາຍງານ</a>
    <a href="pos-customers.html" class="nav-item">👥 ລູກຄ້າ</a>
    
    <div class="user-box" style="padding: 15px; border-top: 1px solid rgba(255,255,255,0.1); margin-top: 10px;">
        <div id="display-user-name" style="font-weight: 600; color: white; margin-bottom: 15px; font-size: 0.9rem;">ກຳລັງໂຫລດ...</div>
        <button onclick="handleLogout()" style="background: rgba(239, 68, 68, 0.2); color: #f87171; border: none; width: 100%; text-align: left; padding: 10px; cursor: pointer; border-radius: 8px; font-weight: 600; font-size: 14px;">
            🚪 ອອກຈາກລະບົບ
        </button>
    </div>
</nav>
    
<main class="main">
    <h1>ກວດສອບບິນ ແລະ ຄືນສິນຄ້າ</h1>
    <div class="search-container">
        <input type="text" id="receipt-scan" class="search-input" placeholder="ສະແກນບາໂຄ້ດໃບບິນຢູ່ບ່ອນນີ້..." autofocus>
        <button onclick="lookupOrder()" style="padding:15px 30px; background:var(--sidebar); color:white; border-radius:12px; border:none; cursor:pointer; font-weight:600;">ຄົ້ນຫາ</button>
    </div>
    <div id="order-result"></div>
</main>

<div id="print-receipt">
    <div style="text-align:center;">
        <h3 style="margin:0;">ໃບຮັບເງີນ (Copy)</h3>
        <p style="margin:2px 0;">mPOS System</p>
        <p>ຮ້ານ..............ໂທ: 020xxxxxxx</p>
    </div>
    <div class="r-line"></div>
    <div id="receipt-header-info"></div>
    <div class="r-line"></div>
    <div id="receipt-items"></div>
    <div class="r-line"></div>
    <div id="receipt-totals" style="font-weight:bold;"></div>
    <div class="r-line"></div>
    <div style="text-align:center;">
        <svg id="receipt-barcode"></svg>
        <p>Thank You!</p>
        <p>Powered by Somphone 02055348882</p>
    </div>
</div>

<script>
    const u = "https://zddelixvencundnkccpq.supabase.co"; 
    const k = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpkZGVsaXh2ZW5jdW5kbmtjY3BxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxMjQ1MzMsImV4cCI6MjA5MDcwMDUzM30.-RPvOYMLzftubrpJ4KSVrqL2eNaopjty30_TrnkGpBo";
    const _s = supabase.createClient(u, k);

    let currentFoundOrder = null; // ເກັບຂໍ້ມູນບິນທີ່ຫາເຫັນໄວ້ໃນຕົວປ່ຽນ Global

    document.getElementById('receipt-scan').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') lookupOrder();
    });

    async function lookupOrder() {
        const code = document.getElementById('receipt-scan').value.trim();
        if (!code) return;

        const container = document.getElementById('order-result');
        container.innerHTML = `<p style="text-align:center; padding:20px;">ກຳລັງຄົ້ນຫາ...</p>`;

        const { data, error } = await _s.rpc('search_sales_by_id', { search_text: code });

        if (error || !data || data.length === 0) {
            container.innerHTML = `<p style="text-align:center; padding:40px; color:#94a3b8;">❌ ບໍ່ພົບຂໍ້ມູນບິນນີ້</p>`;
            return;
        }

        currentFoundOrder = data[0];
        const order = currentFoundOrder;
        const date = new Date(order.created_at).toLocaleString('lo-LA');
        const isRefunded = order.status === 'Refunded';

        const statusBadge = isRefunded 
            ? `<span class="badge" style="background:#fee2e2; color:#b91c1c;">🔄 ຄືນສິນຄ້າແລ້ວ</span>`
            : `<span class="badge badge-success">✅ ຊຳລະແລ້ວ</span>`;

        container.innerHTML = `
            <div class="order-card">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                    <div>
                        ${statusBadge}
                        <h2 style="margin:10px 0 0 0;">ບິນເລກທີ: #${order.id.substring(0,8).toUpperCase()}</h2>
                        <small style="color:#64748b;">${date}</small>
                    </div>
                    <div style="text-align:right">
                        <div style="font-size:24px; font-weight:800; color:var(--primary);">₭${order.total_amount.toLocaleString()}</div>
                        <small>${order.payment_method}</small>
                    </div>
                </div>

                <div style="border-top: 1px solid #f1f5f9; padding-top:15px;">
                    ${order.items.map(item => `
                        <div class="item-row">
                            <span>${item.name} <b>x${item.qty}</b></span>
                            <span>₭${(item.retail_price * item.qty).toLocaleString()}</span>
                        </div>
                    `).join('')}
                </div>

                <div style="margin-top: 20px; display: flex;">
                    <button class="btn-print" onclick="reprintReceipt()">🖨️ ພິມໃບບິນຄືນ (Print Receipt)</button>
                    ${!isRefunded ? 
                        `<button id="btn-ret-${order.id}" class="btn-return" onclick="processReturn('${order.id}')">🔄 ຄືນສິນຄ້າ (Return)</button>` : 
                        `<p style="color:#ef4444; font-weight:bold; margin-left: 15px;">ຄືນສິນຄ້າແລ້ວ</p>`
                    }
                </div>
            </div>
        `;
    }

    function reprintReceipt() {
        if (!currentFoundOrder) return;
        const order = currentFoundOrder;
        const shortID = order.id.substring(0, 8).toUpperCase();
        const dateStr = new Date(order.created_at).toLocaleString('lo-LA');

        document.getElementById('receipt-header-info').innerHTML = `ID: #${shortID}<br>Date: ${dateStr}`;
        document.getElementById('receipt-items').innerHTML = order.items.map(i => `
            <div class="receipt-row"><span>${i.name} x${i.qty}</span><span>${(i.retail_price * i.qty).toLocaleString()}</span></div>
        `).join('');
        document.getElementById('receipt-totals').innerHTML = `<div class="receipt-row"><span>TOTAL</span><span>${order.total_amount.toLocaleString()} LAK</span></div>`;

        JsBarcode("#receipt-barcode", shortID, { format: "CODE128", width: 1.5, height: 40, displayValue: false });

        setTimeout(() => { window.print(); }, 500);
    }

    async function processReturn(orderId) {
        if (!confirm("ຢືນຢັນການຄືນສິນຄ້າ ແລະ ເພີ່ມສະຕັອກຄືນ?")) return;
        const btn = document.getElementById(`btn-ret-${orderId}`);
        btn.disabled = true;
        btn.innerText = "ກຳລັງປະມວນຜົນ...";

        try {
            const { data: order, error: fErr } = await _s.from('pos_sales').select('*').eq('id', orderId).single();
            if (fErr) throw fErr;

            for (const item of order.items) {
                await _s.rpc('deduct_inventory', { p_barcode: item.barcode, p_qty: -item.qty });
            }

            const staffName = localStorage.getItem('lsm_user_name') || 'Unknown';
            await _s.from('pos_sales').update({ status: 'Refunded', return_processed_by: staffName }).eq('id', orderId);

            alert("✅ ຄືນສິນຄ້າສຳເລັດ!");
            lookupOrder();
        } catch (err) {
            alert("Error: " + err.message);
            btn.disabled = false;
        }
    }

    function handleLogout() { localStorage.clear(); window.location.href = 'login.html'; }
</script>
</body>
</html>
