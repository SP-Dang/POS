<!DOCTYPE html>
<html lang="lo">
<head>
    <meta charset="UTF-8">
    <title>LSM POS | ລູກຄ້າຊຳລະເງິນ</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Phetsarath&family=Plus+Jakarta+Sans:wght@400;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #10b981; --bg: #f8fafc; --lao: 'Phetsarath', sans-serif; }
        body { margin: 0; background: var(--bg); font-family: 'Plus Jakarta Sans', var(--lao); display: flex; align-items: center; justify-content: center; height: 100vh; }
        
        .card { background: white; padding: 50px; border-radius: 40px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.1); width: 450px; text-align: center; transition: transform 0.3s ease; }
        .card-active { border: 4px solid var(--primary); transform: scale(1.02); }
        
        h1 { margin:0; color: #0f172a; }
        #amount { font-size: 56px; font-weight: 800; color: var(--primary); margin: 20px 0; }
        
        #qrcode-canvas { display: flex; justify-content: center; align-items: center; margin: 30px auto; min-height: 280px; width: 280px; background: white; border-radius: 10px; }
        .waiting-text { color: #94a3b8; font-style: italic; font-size: 18px; }
        
        .footer { color: #64748b; font-size: 14px; margin-top: 20px; line-height: 1.5; }
    </style>
</head>
<body>

    <div class="card" id="main-card">
        <h1 id="status-text">ຊຳລະເງິນ (Scan to Pay)</h1>
        <div id="amount">₭0</div>
        
        <div id="qrcode-canvas">
            <div class="waiting-text">ກຳລັງລໍຖ້າລາຍການຊຳລະ...</div>
        </div>
        
        <div class="footer">
            <b>LSM Garage & Service</b><br> 
            ບໍລິການດ້ວຍໃຈ ເພື່ອຄວາມປອດໄພຂອງທ່ານ
        </div>
    </div>

    <script>
        // ປ່ຽນເປັນ Key ຂອງທ່ານໃຫ້ກົງກັບໜ້າ checkout
        const u = "https://zddelixvencundnkccpq.supabase.co"; 
        const k = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpkZGVsaXh2ZW5jdW5kbmtjY3BxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxMjQ1MzMsImV4cCI6MjA5MDcwMDUzM30.-RPvOYMLzftubrpJ4KSVrqL2eNaopjty30_TrnkGpBo";
        const _s = supabase.createClient(u, k);

        // 1. ເປີດຮັບສັນຍານ Realtime ຈາກ Supabase
        _s.channel('customer-view-channel')
          .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'customer_display' }, payload => {
              updateDisplay(payload.new);
          })
          .subscribe((status) => {
              console.log("Realtime connection status:", status);
          });

        function updateDisplay(data) {
            // ອັບເດດໂຕເລກເງິນ
            document.getElementById('amount').innerText = `₭${Number(data.amount).toLocaleString()}`;
            
            // ລຶບຂໍ້ຄວາມ "ກຳລັງລໍຖ້າ" ອອກ
            const qrContainer = document.getElementById("qrcode-canvas");
            qrContainer.innerHTML = ""; 
            
            // ສ້າງ QR Code ໃໝ່ຈາກ String ທີ່ສົ່ງມາ
            new QRCode(qrContainer, {
                text: data.qr_string,
                width: 280, 
                height: 280,
                colorDark: "#0f172a",
                correctLevel: QRCode.CorrectLevel.M
            });

            // ສ້າງ Effect ກະພິບໃຫ້ລູກຄ້າຮູ້ວ່າມີຍອດເຂົ້າໃໝ່
            const card = document.getElementById('main-card');
            card.classList.add('card-active');
            setTimeout(() => { card.classList.remove('card-active'); }, 600);
        }
    </script>
</body>
</html>
