<!DOCTYPE html>
<html lang="en"><head>
    <meta charset="UTF-8">
    <title>LSM POS - INVENTORY</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/papaparse/5.3.2/papaparse.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; padding: 20px; }
        .log { background: #333; color: #00ff00; padding: 10px; font-family: monospace; font-size: 12px; margin-bottom: 20px; border-radius: 5px; min-height: 40px; }
        .upload-area { border: 3px dashed #27ae60; background: white; padding: 40px; text-align: center; cursor: pointer; border-radius: 15px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background: #2d3436; color: white; }
    </style>
</head><body>

    <div id="debug-log" class="log">System Status: Waiting for file...</div>

    <div class="upload-area" id="drop-zone">
        <h2>Click here to upload Product CSV</h2>
        <p>Required columns: <b>Barcode, Name, Category, Price, Qty, MinQty</b></p>
        <input type="file" id="file-input" style="display:none" accept=".csv">
    </div>

    <table id="inventory-table">
        <thead>
            <tr><th>Barcode</th><th>Name</th><th>Stock</th><th>Price</th></tr>
        </thead>
        <tbody></tbody>
    </table>

<script>
    // MATCHED KEYS
    const u = "https://zddelixvencundnkccpq.supabase.co"; 
    const k = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpkZGVsaXh2ZW5jdW5kbmtjY3BxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxMjQ1MzMsImV4cCI6MjA5MDcwMDUzM30.-RPvOYMLzftubrpJ4KSVrqL2eNaopjty30_TrnkGpBo";
    const _s = supabase.createClient(u, k);

    const log = (msg, isError = false) => {
        const el = document.getElementById('debug-log');
        el.innerText = msg;
        el.style.color = isError ? "#ff7675" : "#00ff00";
    };

    // 1. Click Trigger
    document.getElementById('drop-zone').onclick = () => document.getElementById('file-input').click();

    // 2. File Processing
    document.getElementById('file-input').onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        log("Reading: " + file.name + "...");

        Papa.parse(file, {
            header: true,
            skipEmptyLines: true,
            complete: async (results) => {
                log("Processing " + results.data.length + " rows...");
                
                const formatted = results.data.map(row => ({
                    barcode: String(row.Barcode || '').trim(),
                    name: row.Name,
                    category: row.Category || 'Parts',
                    retail_price: parseFloat(row.Price) || 0,
                    stock_qty: parseInt(row.Qty) || 0,
                    min_stock: parseInt(row.MinQty) || 5
                })).filter(item => item.name); // Ignore empty rows

                log("Sending to Supabase... please wait.");

                const { data, error } = await _s.from('pos_products').upsert(formatted, { onConflict: 'barcode' });

                if (error) {
                    log("❌ ERROR: " + error.message + " (" + error.details + ")", true);
                    console.error(error);
                } else {
                    log("✅ SUCCESS! " + formatted.length + " items updated.");
                    loadData();
                }
            }
        });
    };

    async function loadData() {
        const { data } = await _s.from('pos_products').select('*').order('name');
        const tbody = document.querySelector('tbody');
        tbody.innerHTML = data.map(i => `<tr><td>${i.barcode}</td><td>${i.name}</td><td>${i.stock_qty}</td><td>$${i.retail_price}</td></tr>`).join('');
    }

    loadData();
</script>
</body></html>
